<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Parcel Delivery | PackZen</title>
  <meta name="description" content="Instant parcel delivery, same-day delivery, live rider tracking. Starting from ₹59.">
  <meta name="theme-color" content="#0f172a">

  <!-- Core Styles -->
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="desktop.css" media="(min-width: 1024px)">
  <link rel="stylesheet" href="mobile-fixes.css">
  <link rel="stylesheet" href="theme-dg.css">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Add missing styles for Parcel Form */
    .parcel-form-container {
        max-width: 600px;
        margin: 0 auto;
        padding: 20px;
        margin-top: 80px;
    }
    .parcel-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--border-light);
        border-radius: var(--radius-2xl);
        padding: 24px;
        box-shadow: var(--shadow-lg);
    }
    .form-progress {
        background: #e2e8f0;
        height: 8px;
        border-radius: 4px;
        margin-bottom: 20px;
        overflow: hidden;
    }
    .progress-bar {
        background: var(--green-500);
        height: 100%;
        transition: width 0.3s ease;
    }
    .file-upload-lbl {
        display: block;
        padding: 10px;
        border: 2px dashed var(--border-light);
        border-radius: var(--radius-md);
        text-align: center;
        cursor: pointer;
        color: var(--text-muted);
        margin-top: 10px;
    }
    .file-upload-lbl input {
        display: none;
    }
  </style>
</head>
<body class="theme-light">
  <header class="app-header">
    <div class="logo">Pack<span>Zen</span> Parcel</div>
    <div class="header-actions">
      <button class="nav-btn" onclick="window.location.href='index.html'">Back to Home</button>
    </div>
  </header>

  <main class="parcel-form-container">
    <div class="parcel-card" id="parcelBookingCard">
      <div class="form-header">
        <h2 class="form-title" id="formTitle">Book a Parcel</h2>
        <div class="form-progress">
          <div class="progress-bar" id="progressBar" style="width: 12.5%;"></div>
        </div>
      </div>

      <!-- Step 1: Pickup Address -->
      <div class="form-step active" id="step1">
        <label class="field-label">Pickup Address</label>
        <div class="field-group">
          <input type="text" id="pickupAddress" class="field-input" placeholder="Search pickup location...">
          <button class="btn-secondary" style="margin-top:10px; width:100%;" onclick="useCurrentLocation('pickup')">📍 Current Location</button>
        </div>
      </div>

      <!-- Step 2: Delivery Address -->
      <div class="form-step" id="step2" style="display:none;">
        <label class="field-label">Delivery Address</label>
        <div class="field-group">
          <input type="text" id="deliveryAddress" class="field-input" placeholder="Search delivery location...">
        </div>
        <div id="distanceEtaInfo" style="margin-top:10px; font-size:0.9rem; color:var(--text-muted); font-weight:600;"></div>
      </div>

      <!-- Step 3: Parcel Details -->
      <div class="form-step" id="step3" style="display:none;">
        <label class="field-label">Category</label>
        <select id="parcelCategory" class="field-input">
          <option value="Documents">Documents</option>
          <option value="Food">Food</option>
          <option value="Groceries">Groceries</option>
          <option value="Medicines">Medicines</option>
          <option value="Electronics">Electronics</option>
          <option value="Clothes">Clothes</option>
          <option value="Gifts">Gifts</option>
          <option value="Fragile">Fragile</option>
          <option value="Other">Other</option>
        </select>

        <label class="field-label" style="margin-top:15px;">Weight</label>
        <select id="parcelWeight" class="field-input">
          <option value="Under 1kg">Under 1kg</option>
          <option value="1–3kg">1–3kg</option>
          <option value="3–5kg">3–5kg</option>
          <option value="5–10kg">5–10kg</option>
          <option value="10–20kg">10–20kg</option>
        </select>

        <label class="field-label" style="margin-top:15px;">Size</label>
        <select id="parcelSize" class="field-input">
          <option value="Small">Small</option>
          <option value="Medium">Medium</option>
          <option value="Large">Large</option>
        </select>

        <label class="field-label" style="margin-top:15px;">Parcel Photo (Optional)</label>
        <label class="file-upload-lbl">
           📷 Tap to upload photo
           <input type="file" id="parcelPhoto" accept="image/*">
        </label>

        <label class="field-label" style="margin-top:15px;">Delivery Instructions (Optional)</label>
        <input type="text" id="parcelInstructions" class="field-input" placeholder="e.g. Handle with care, leave at door">
      </div>

      <!-- Step 4: Receiver Info -->
      <div class="form-step" id="step4" style="display:none;">
        <label class="field-label">Receiver Name</label>
        <input type="text" id="receiverName" class="field-input" placeholder="Enter name">

        <label class="field-label" style="margin-top:15px;">Mobile Number</label>
        <input type="tel" id="receiverMobile" class="field-input" placeholder="10-digit mobile number">
      </div>

      <!-- Step 5: Delivery Type -->
      <div class="form-step" id="step5" style="display:none;">
        <label class="field-label">Delivery Type</label>
        <div style="display:flex; flex-direction:column; gap:10px;">
            <div class="move-type-card" style="width:100%; display:flex; align-items:center; gap:15px;" onclick="selectDeliveryType(this, 'Economy')">
            <div class="mtc-icon" style="font-size:1.5rem;">🛵</div>
            <div class="mtc-info" style="text-align:left;">
                <div class="mtc-title">Economy</div>
                <div class="mtc-desc">Standard delivery time</div>
            </div>
            </div>
            <div class="move-type-card" style="width:100%; display:flex; align-items:center; gap:15px;" onclick="selectDeliveryType(this, 'Express')">
            <div class="mtc-icon" style="font-size:1.5rem;">⚡</div>
            <div class="mtc-info" style="text-align:left;">
                <div class="mtc-title">Express</div>
                <div class="mtc-desc">Fastest delivery (+₹60)</div>
            </div>
            </div>
        </div>
      </div>

      <!-- Step 6: Pricing -->
      <div class="form-step" id="step6" style="display:none;">
        <h3 style="margin-bottom:15px; font-family:'Space Grotesk',sans-serif;">Fare Breakdown</h3>
        <div id="pricingBreakdown" style="background:var(--surface2); padding:15px; border-radius:12px; font-size:0.95rem; border:1px solid var(--border);"></div>
      </div>

      <!-- Step 7: Payment -->
      <div class="form-step" id="step7" style="display:none;">
        <h3 style="margin-bottom:15px; font-family:'Space Grotesk',sans-serif;">Payment</h3>
        <p style="color:var(--text-muted); margin-bottom:15px;">Pay securely with Razorpay.</p>
      </div>

      <!-- Step 8: Success -->
      <div class="form-step" id="step8" style="display:none;">
        <div style="text-align:center;">
          <div style="font-size:4rem; margin-bottom:10px;">🎉</div>
          <h3 style="font-family:'Space Grotesk',sans-serif; margin-bottom:10px;">Booking Confirmed!</h3>
          <p id="successBookingId" style="color:var(--text-muted); font-weight:600; margin-bottom:20px;"></p>
          <button class="btn-auth" onclick="goToTracking()">Track Rider</button>
        </div>
      </div>

      <!-- Navigation Buttons -->
      <div class="form-footer" id="formFooter" style="display:flex; justify-content:space-between; margin-top:20px; gap:10px;">
        <button class="btn-secondary" id="btnBack" onclick="prevStep()" style="display:none; flex:1;">Back</button>
        <button class="btn-auth" id="btnNext" onclick="nextStep()" style="flex:1; margin-top:0;">Next</button>
      </div>
    </div>
  </main>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="env-config.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    let currentStep = 1;
    let distanceKm = 0;
    let selectedDeliveryType = '';
    let mapService, placesService, autocompletePickup, autocompleteDelivery;
    let originPlaceId, destinationPlaceId;

    function initMap() {
      const pickupInput = document.getElementById("pickupAddress");
      const deliveryInput = document.getElementById("deliveryAddress");

      if (typeof google === 'object' && typeof google.maps === 'object') {
        autocompletePickup = new google.maps.places.Autocomplete(pickupInput, { componentRestrictions: { country: "in" } });
        autocompleteDelivery = new google.maps.places.Autocomplete(deliveryInput, { componentRestrictions: { country: "in" } });

        autocompletePickup.addListener("place_changed", () => {
          const place = autocompletePickup.getPlace();
          originPlaceId = place.place_id;
        });

        autocompleteDelivery.addListener("place_changed", () => {
          const place = autocompleteDelivery.getPlace();
          destinationPlaceId = place.place_id;
          calculateDistance();
        });
      }
    }

    function calculateDistance() {
      if (!originPlaceId || !destinationPlaceId) return;
      const service = new google.maps.DistanceMatrixService();
      service.getDistanceMatrix({
        origins: [{placeId: originPlaceId}],
        destinations: [{placeId: destinationPlaceId}],
        travelMode: google.maps.TravelMode.DRIVING,
      }, (response, status) => {
        if (status === 'OK' && response.rows[0].elements[0].status === 'OK') {
          distanceKm = response.rows[0].elements[0].distance.value / 1000;
          document.getElementById('distanceEtaInfo').innerText = `Distance: ${distanceKm.toFixed(1)} km`;
        }
      });
    }

    function useCurrentLocation(type) {
      if (navigator.geolocation) {
        document.getElementById("pickupAddress").value = "Fetching location...";
        navigator.geolocation.getCurrentPosition((position) => {
          const geocoder = new google.maps.Geocoder();
          const latlng = { lat: position.coords.latitude, lng: position.coords.longitude };
          geocoder.geocode({ location: latlng }, (results, status) => {
            if (status === "OK" && results[0]) {
               if (type === 'pickup') {
                  document.getElementById("pickupAddress").value = results[0].formatted_address;
                  originPlaceId = results[0].place_id;
               }
            } else {
               document.getElementById("pickupAddress").value = "";
               alert("Location could not be determined.");
            }
          });
        }, () => {
           document.getElementById("pickupAddress").value = "";
           alert("Geolocation failed.");
        });
      } else {
          alert("Geolocation is not supported by this browser.");
      }
    }

    function selectDeliveryType(element, type) {
      document.querySelectorAll('#step5 .move-type-card').forEach(c => c.classList.remove('selected'));
      element.classList.add('selected');
      selectedDeliveryType = type;
    }

    function nextStep() {
      if (currentStep === 1 && !document.getElementById("pickupAddress").value) { alert("Please enter pickup address."); return; }
      if (currentStep === 2 && !document.getElementById("deliveryAddress").value) { alert("Please enter delivery address."); return; }
      if (currentStep === 4 && (!document.getElementById("receiverName").value || !document.getElementById("receiverMobile").value)) { alert("Please enter receiver details."); return; }
      if (currentStep === 5 && !selectedDeliveryType) { alert("Please select delivery type."); return; }

      if (currentStep === 5) {
         calculatePricing();
      }

      if (currentStep === 6) {
         currentStep++;
         updateView();
         setTimeout(() => {
           document.getElementById('btnNext').innerText = `Pay Securely (₹${totalFare})`;
           document.getElementById('btnNext').onclick = processPayment;
         }, 100);
         return;
      }

      document.getElementById(`step${currentStep}`).style.display = 'none';
      currentStep++;
      updateView();
    }

    function prevStep() {
      if (currentStep > 1) {
        document.getElementById(`step${currentStep}`).style.display = 'none';
        currentStep--;
        updateView();
      }
    }

    let baseFare = 40;
    let weightCharge = 0;
    let distanceCharge = 0;
    let expressCharge = 0;
    let taxCharge = 0;
    let surgeCharge = 0;
    let totalFare = 0;

    function calculatePricing() {
      const weight = document.getElementById("parcelWeight").value;
      weightCharge = 0;
      if (weight === "1–3kg" || weight === "3–5kg") weightCharge = 20;
      else if (weight === "5–10kg") weightCharge = 40;
      else if (weight === "10–20kg") weightCharge = 80;

      expressCharge = selectedDeliveryType === 'Express' ? 60 : 0;

      distanceCharge = 0;
      if (distanceKm > 2) {
         distanceCharge = Math.ceil(distanceKm - 2) * 8;
      }

      // Time-based surge logic
      const hour = new Date().getHours();
      surgeCharge = 0;
      if (hour >= 22 || hour <= 5) {
          surgeCharge = 30; // Night surge
      }

      let subtotal = baseFare + distanceCharge + weightCharge + expressCharge + surgeCharge;
      taxCharge = Math.round(subtotal * 0.18); // 18% GST

      totalFare = subtotal + taxCharge;
      if (totalFare < 59) totalFare = 59;

      let html = `<div style="display:flex; justify-content:space-between; margin-bottom:8px; font-weight:600;"><span>Base Fare (First 2km)</span><span>₹${baseFare}</span></div>`;
      if (distanceCharge > 0) {
         html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-muted);"><span>Distance Charge (${distanceKm.toFixed(1)}km)</span><span>₹${distanceCharge}</span></div>`;
      }
      if (weightCharge > 0) {
         html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-muted);"><span>Weight Charge (${weight})</span><span>₹${weightCharge}</span></div>`;
      }
      if (expressCharge > 0) {
         html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-muted);"><span>Express Delivery</span><span>₹${expressCharge}</span></div>`;
      }
      if (surgeCharge > 0) {
         html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; color:#f59e0b;"><span>Night Surge</span><span>₹${surgeCharge}</span></div>`;
      }
      html += `<div style="display:flex; justify-content:space-between; margin-bottom:8px; color:var(--text-muted);"><span>Taxes (18% GST)</span><span>₹${taxCharge}</span></div>`;

      html += `<hr style="margin:10px 0; border:none; border-top:1px dashed var(--border);">`;
      html += `<div style="display:flex; justify-content:space-between; font-weight:800; font-size:1.2rem; color:var(--primary);"><span>Total Fare</span><span>₹${totalFare}</span></div>`;

      document.getElementById("pricingBreakdown").innerHTML = html;
    }

    async function processPayment() {
      const user = firebase.auth().currentUser;
      if (!user) {
        alert("Please login to complete booking.");
        return;
      }

      document.getElementById('btnNext').innerText = "Processing...";
      document.getElementById('btnNext').disabled = true;

      try {
        const orderResponse = await fetch("https://asia-south1-packzen-e7539.cloudfunctions.net/createRazorpayOrder", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ amount: totalFare })
        });
        const orderData = await orderResponse.json();

        if (!orderData.id) throw new Error("Could not create Razorpay order");

        const rzp = new Razorpay({
          key: window.ENV.RAZORPAY_KEY,
          amount: totalFare * 100,
          currency: "INR",
          name: "PackZen Parcel",
          description: "Parcel Delivery Booking",
          order_id: orderData.id,
          handler: async function (response) {
            document.getElementById('btnNext').innerText = "Verifying Payment...";

            // Server-side verification utilizing existing verify Razorpay CF logic
            try {
               const verifyRes = await fetch("https://asia-south1-packzen-e7539.cloudfunctions.net/verifyRazorpayPayment", {
                   method: "POST",
                   headers: { "Content-Type": "application/json" },
                   body: JSON.stringify({
                       razorpay_order_id: response.razorpay_order_id,
                       razorpay_payment_id: response.razorpay_payment_id,
                       razorpay_signature: response.razorpay_signature,
                       bookingData: { module: "parcel" }
                   })
               });
               const verifyData = await verifyRes.json();
               if(verifyData.success) {
                   await saveBooking(response.razorpay_payment_id);
               } else {
                   alert("Payment verification failed.");
                   document.getElementById('btnNext').innerText = `Pay Securely (₹${totalFare})`;
                   document.getElementById('btnNext').disabled = false;
               }
            } catch (err) {
               alert("Verification error.");
               document.getElementById('btnNext').innerText = `Pay Securely (₹${totalFare})`;
               document.getElementById('btnNext').disabled = false;
            }
          },
          prefill: {
            name: user.displayName || "Customer",
            email: user.email || "",
            contact: user.phoneNumber || ""
          },
          theme: { color: "#16a34a" }
        });

        rzp.on('payment.failed', function (response) {
          alert("Payment failed. Please try again.");
          document.getElementById('btnNext').innerText = `Pay Securely (₹${totalFare})`;
          document.getElementById('btnNext').disabled = false;
        });

        rzp.open();

      } catch (err) {
        alert("Payment initialization failed.");
        document.getElementById('btnNext').innerText = `Pay Securely (₹${totalFare})`;
        document.getElementById('btnNext').disabled = false;
      }
    }

    let currentBookingId = '';

    async function saveBooking(paymentId) {
       const user = firebase.auth().currentUser;
       if (!user) return;

       const db = firebase.firestore();
       const pickupAddress = document.getElementById("pickupAddress").value;
       const deliveryAddress = document.getElementById("deliveryAddress").value;
       const category = document.getElementById("parcelCategory").value;
       const weight = document.getElementById("parcelWeight").value;
       const size = document.getElementById("parcelSize").value;
       const instructions = document.getElementById("parcelInstructions").value;
       const recName = document.getElementById("receiverName").value;
       const recMobile = document.getElementById("receiverMobile").value;

       const newBookingRef = db.collection("parcelBookings").doc();
       currentBookingId = newBookingRef.id;

       const otp = Math.floor(1000 + Math.random() * 9000).toString();

       const bookingData = {
          bookingId: currentBookingId,
          customerUid: user.uid,
          customerName: user.displayName || "Customer",
          customerPhone: user.phoneNumber || "",
          pickupAddress: pickupAddress,
          deliveryAddress: deliveryAddress,
          distanceKm: distanceKm,
          category: category,
          weight: weight,
          size: size,
          instructions: instructions,
          receiverName: recName,
          receiverMobile: recMobile,
          deliveryType: selectedDeliveryType,
          totalFare: totalFare,
          paymentId: paymentId,
          paymentStatus: "success",
          status: "confirmed",
          deliveryOTP: otp,
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
       };

       try {
          await newBookingRef.set(bookingData);
          document.getElementById('successBookingId').innerText = "Booking ID: " + currentBookingId;
          document.getElementById(`step${currentStep}`).style.display = 'none';
          currentStep = 8;
          updateView();
       } catch (e) {
          alert("Failed to save booking. Contact support.");
       }
    }

    function goToTracking() {
       if (currentBookingId) {
          window.location.href = `parcel-tracking.html?id=${currentBookingId}`;
       }
    }

    function updateView() {
      document.getElementById(`step${currentStep}`).style.display = 'block';
      document.getElementById('btnBack').style.display = currentStep > 1 && currentStep < 8 ? 'block' : 'none';
      document.getElementById('progressBar').style.width = `${(currentStep / 8) * 100}%`;

      const titles = ["Book a Parcel", "Delivery Address", "Parcel Details", "Receiver Info", "Delivery Type", "Pricing", "Payment", "Success"];
      document.getElementById('formTitle').innerText = titles[currentStep - 1] || "Parcel Booking";

      if (currentStep === 8) {
         document.getElementById('formFooter').style.display = 'none';
      }
    }

    function loadGoogleMaps() {
      if (document.getElementById('google-maps-script')) return;
      const s = document.createElement('script');
      s.id = 'google-maps-script';
      s.src = 'https://maps.googleapis.com/maps/api/js?key=' + window.ENV.GOOGLE_MAPS_KEY + '&libraries=places&callback=initMap';
      s.async = true;
      s.defer = true;
      document.head.appendChild(s);
    }

    window.addEventListener('load', () => {
       if (window.ENV && window.ENV.GOOGLE_MAPS_KEY) {
          loadGoogleMaps();
       }
    });
  </script>
</body>
</html>
