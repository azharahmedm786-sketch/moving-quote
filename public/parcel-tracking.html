<!DOCTYPE html>
<html lang="en-IN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Parcel Tracking | PackZen</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="desktop.css" media="(min-width: 1024px)">
  <link rel="stylesheet" href="mobile-fixes.css">
  <link rel="stylesheet" href="theme-dg.css">

  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    .tracking-screen { padding-top: 70px; min-height: 100vh; background: var(--surface-bg); max-width: 600px; margin: 0 auto; }
    .driver-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border-light); border-radius: 16px; padding: 15px; margin: 15px; box-shadow: var(--shadow-md); display: flex; align-items: center; gap: 15px; }
    .driver-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; }
    .driver-info { flex: 1; }
    .driver-name { font-weight: 800; font-family: 'Space Grotesk',sans-serif; font-size: 1.1rem; }
    .driver-vehicle { color: var(--text-muted); font-size: 0.85rem; }
    .action-btn { background: var(--primary); color: white; border: none; padding: 8px 12px; border-radius: 8px; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; }

    .tracking-map-area { height: 250px; background: #e2e8f0; border-radius: 16px; margin: 15px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-weight: 600; overflow: hidden; position: relative; }

    .timeline { background: rgba(255, 255, 255, 0.9); border-radius: 16px; padding: 20px; margin: 15px; box-shadow: var(--shadow-sm); border: 1px solid var(--border-light); }
    .step { display: flex; gap: 15px; margin-bottom: 20px; position: relative; }
    .step::before { content: ''; position: absolute; left: 11px; top: 24px; bottom: -20px; width: 2px; background: #e2e8f0; }
    .step:last-child::before { display: none; }
    .step.active::before { background: var(--green-500); }
    .step-icon { width: 24px; height: 24px; border-radius: 50%; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #fff; z-index: 1; position: relative; }
    .step.active .step-icon { background: var(--green-500); }
    .step-content { flex: 1; }
    .step-title { font-weight: 700; font-size: 0.95rem; color: var(--text-primary); }
    .step-time { font-size: 0.75rem; color: var(--text-muted); }
  </style>

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="theme-light">
  <header class="app-header">
    <div class="logo">Pack<span>Zen</span> Parcel</div>
    <div class="header-actions">
      <button class="nav-btn" onclick="window.location.href='index.html'">Home</button>
    </div>
  </header>

  <div class="tracking-screen">
    <div style="padding: 15px; font-weight: 800; font-size: 1.3rem; font-family: 'Space Grotesk',sans-serif;" id="trackTitle">Live Tracking</div>

    <div class="driver-card">
      <div class="driver-avatar">🏍️</div>
      <div class="driver-info">
        <div class="driver-name" id="dName">Assigning Rider...</div>
        <div class="driver-vehicle" id="dVehicle">Please wait</div>
      </div>
      <a href="#" class="action-btn" id="dPhone" style="display:none;"><i data-lucide="phone"></i> Call</a>
    </div>

    <div class="tracking-map-area" id="trackingMap">
      <span id="mapPlaceholderText"><i data-lucide="map-pin"></i> Loading Map...</span>
    </div>

    <div class="timeline">
      <div class="step active" id="ts-confirmed">
        <div class="step-icon">✓</div>
        <div class="step-content">
          <div class="step-title">Booking Confirmed</div>
          <div class="step-time">Waiting for rider</div>
        </div>
      </div>
      <div class="step" id="ts-assigned">
        <div class="step-icon">2</div>
        <div class="step-content">
          <div class="step-title">Rider Assigned</div>
          <div class="step-time" id="time-assigned">--</div>
        </div>
      </div>
      <div class="step" id="ts-arrived">
        <div class="step-icon">3</div>
        <div class="step-content">
          <div class="step-title">Rider Arrived</div>
          <div class="step-time" id="time-arrived">--</div>
        </div>
      </div>
      <div class="step" id="ts-picked">
        <div class="step-icon">4</div>
        <div class="step-content">
          <div class="step-title">Parcel Picked Up</div>
          <div class="step-time" id="time-picked">--</div>
        </div>
      </div>
      <div class="step" id="ts-transit">
        <div class="step-icon">5</div>
        <div class="step-content">
          <div class="step-title">In Transit</div>
          <div class="step-time" id="time-transit">--</div>
        </div>
      </div>
      <div class="step" id="ts-delivered">
        <div class="step-icon">6</div>
        <div class="step-content">
          <div class="step-title">Delivered</div>
          <div class="step-time" id="time-delivered">--</div>
        </div>
      </div>
    </div>

    <div style="margin: 15px; background: rgba(255,255,255,0.9); padding:15px; border-radius:16px; box-shadow:var(--shadow-sm); border:1px solid var(--border-light);">
       <h4 style="margin-bottom:10px; font-family:'Space Grotesk',sans-serif; text-align:center;">Delivery OTP</h4>
       <div style="font-size: 2.2rem; letter-spacing: 8px; font-weight:800; text-align:center; color:var(--green-500);" id="deliveryOtp">----</div>
       <p style="text-align:center; font-size:0.8rem; color:var(--text-muted); margin-top:5px;">Share this OTP with the rider at delivery</p>
    </div>

  </div>

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>

  <script src="env-config.js"></script>
  <script src="firebase-config.js"></script>

  <script>
    let map, directionsService, directionsRenderer;

    document.addEventListener("DOMContentLoaded", () => {
       const urlParams = new URLSearchParams(window.location.search);
       const bookingId = urlParams.get('id');

       if (!bookingId) {
          alert("No tracking ID provided.");
          window.location.href = "index.html";
          return;
       }

       firebase.auth().onAuthStateChanged((user) => {
          if (user) {
             startTracking(bookingId);
          } else {
             alert("Please login to track your parcel.");
          }
       });
    });

    function startTracking(bookingId) {
       const db = firebase.firestore();
       db.collection("parcelBookings").doc(bookingId).onSnapshot((doc) => {
          if (doc.exists) {
             const data = doc.data();
             updateUI(data);
             if (window.google && window.google.maps) {
                renderMap(data.pickupAddress, data.deliveryAddress);
             }
          } else {
             alert("Booking not found.");
          }
       });
    }

    function renderMap(origin, destination) {
       if (!origin || !destination) return;
       document.getElementById('mapPlaceholderText').style.display = 'none';

       if (!map) {
           map = new google.maps.Map(document.getElementById("trackingMap"), {
               zoom: 12,
               center: { lat: 12.9716, lng: 77.5946 }, // Bangalore default
               disableDefaultUI: true
           });
           directionsService = new google.maps.DirectionsService();
           directionsRenderer = new google.maps.DirectionsRenderer();
           directionsRenderer.setMap(map);
       }

       directionsService.route({
           origin: origin,
           destination: destination,
           travelMode: google.maps.TravelMode.DRIVING
       }, (response, status) => {
           if (status === 'OK') {
               directionsRenderer.setDirections(response);
           }
       });
    }

    function updateUI(data) {
       if (data.driverUid) {
          document.getElementById('dName').innerText = data.driverName || "Assigned Rider";
          document.getElementById('dVehicle').innerText = data.driverVehicle || "On their way";
          if (data.driverPhone) {
             document.getElementById('dPhone').style.display = 'inline-flex';
             document.getElementById('dPhone').href = `tel:${data.driverPhone}`;
          }
       }

       document.getElementById('deliveryOtp').innerText = data.deliveryOTP || "----";

       const statuses = ['confirmed', 'assigned', 'arrived', 'picked_up', 'in_transit', 'delivered'];
       let currentStatusIndex = statuses.indexOf(data.status);
       if (currentStatusIndex === -1) currentStatusIndex = 0;

       const steps = ['ts-confirmed', 'ts-assigned', 'ts-arrived', 'ts-picked', 'ts-transit', 'ts-delivered'];

       for(let i=0; i<steps.length; i++) {
          const stepEl = document.getElementById(steps[i]);
          if (i <= currentStatusIndex) {
             stepEl.classList.add('active');
             stepEl.querySelector('.step-icon').innerText = '✓';
          } else {
             stepEl.classList.remove('active');
             stepEl.querySelector('.step-icon').innerText = (i+1).toString();
          }
       }
    }

    function loadGoogleMaps() {
      if (document.getElementById('google-maps-script')) return;
      const s = document.createElement('script');
      s.id = 'google-maps-script';
      s.src = 'https://maps.googleapis.com/maps/api/js?key=' + window.ENV.GOOGLE_MAPS_KEY + '&callback=initMapPlaceholder';
      s.async = true;
      s.defer = true;
      document.head.appendChild(s);
    }

    function initMapPlaceholder() {
       // Called when script loads, actual render happens in tracking update
    }

    window.addEventListener('load', () => {
       if (window.ENV && window.ENV.GOOGLE_MAPS_KEY) {
          loadGoogleMaps();
       }
    });
  </script>




<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();

        // Debounced observer to prevent infinite loops and performance issues
        let timeout;
        const observer = new MutationObserver((mutations) => {
            let shouldUpdate = false;
            for (let m of mutations) {
                if (m.addedNodes.length > 0) {
                    shouldUpdate = true;
                    break;
                }
            }
            if (shouldUpdate) {
                clearTimeout(timeout);
                timeout = setTimeout(() => lucide.createIcons(), 50);
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });
    }
  });
</script>

  <script src="icon-init.js"></script>
</body>
</html>
