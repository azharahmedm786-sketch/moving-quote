<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>PackZen Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>

  <!-- ✅ FIX 1: Block Google from indexing the admin page -->
  <meta name="robots" content="noindex, nofollow, noarchive"/>

  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{--primary:#0057ff;--accent:#00c96e;--dark:#050d1a;--text:#1a2744;--text-muted:#5a6a8a;--surface:#fff;--surface2:#f4f7ff;--border:#dde4f5;--shadow-sm:0 2px 12px rgba(0,60,180,.08);--shadow-md:0 8px 32px rgba(0,60,180,.12)}
    body.dark{--text:#e2e8f4;--text-muted:#8a9bbf;--surface:#0d1f3c;--surface2:#091529;--border:#1e3a5f;--dark:#020810}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Manrope',sans-serif;background:var(--surface2);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
    h1,h2,h3{font-family: 'Space Grotesk',sans-serif}
    .admin-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--dark)}
    .login-card{background:var(--surface);border-radius:24px;padding:40px 36px;max-width:400px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.3)}
    .login-logo{font-family: 'Space Grotesk',sans-serif;font-size:1.5rem;font-weight:800;color:var(--primary);margin-bottom:6px}
    .login-sub{color:var(--text-muted);font-size:.9rem;margin-bottom:28px}
    .field-label{display:block;font-size:.85rem;font-weight:600;color:var(--text-muted);margin-bottom:8px;margin-top:16px}
    .field-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:12px;font-family:'Manrope',sans-serif;font-size:.95rem;color:var(--text);background:var(--surface);outline:none;transition:border-color .2s}
    .field-input:focus{border-color:var(--primary)}
    .btn-auth{width:100%;padding:14px;background:var(--primary);color:#fff;border:none;border-radius:50px;font-family:'Manrope',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;margin-top:20px;box-shadow:0 6px 20px rgba(0,87,255,.3);transition:transform .2s}
    .btn-auth:hover{transform:translateY(-2px)}
    .btn-auth:disabled{opacity:.6;cursor:not-allowed;transform:none}
    .auth-err{font-size:.85rem;color:#e53e3e;margin-top:10px;min-height:18px}
    .lockout-banner{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);border-radius:10px;padding:10px 14px;font-size:.84rem;color:#dc2626;margin-top:12px;display:none}

    /* ✅ FIX 2: Shell is NOT in the DOM at load — injected only after auth passes */
    .admin-shell{display:none}
    .admin-shell.active{display:flex;min-height:100vh}
    .sidebar{width:240px;background:var(--dark);display:flex;flex-direction:column;padding:24px 0;flex-shrink:0;position:fixed;top:0;left:0;bottom:0;z-index:100;overflow-y:auto}
    .sidebar-logo{padding:0 24px 20px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:14px}
    .sidebar-logo span{font-family: 'Space Grotesk',sans-serif;font-size:1.3rem;font-weight:800;color:#fff}
    .sidebar-logo b{color:var(--accent)}
    .sb-role{font-size:.7rem;color:rgba(255,255,255,.4);font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:0 24px;margin:10px 0 5px}
    .nav-item{display:flex;align-items:center;gap:12px;padding:11px 24px;color:rgba(255,255,255,.6);font-size:.88rem;font-weight:500;cursor:pointer;transition:background .2s,color .2s;border-left:3px solid transparent}
    .nav-item:hover{background:rgba(255,255,255,.06);color:#fff}
    .nav-item.active{background:rgba(0,87,255,.15);color:#fff;border-left-color:var(--primary)}
    .nav-item .ni{font-size:1rem;width:20px;text-align:center}
    .sidebar-bottom{margin-top:auto;padding:16px 24px;border-top:1px solid rgba(255,255,255,.08)}
    .btn-signout{width:100%;padding:10px;background:rgba(255,255,255,.08);border:none;border-radius:10px;color:rgba(255,255,255,.7);font-family:'Manrope',sans-serif;font-size:.85rem;cursor:pointer;transition:background .2s}
    .btn-signout:hover{background:rgba(255,80,80,.2);color:#fff}
    .admin-main{margin-left:240px;flex:1;padding:28px;min-height:100vh;background:var(--surface2);transition:background .3s}
    .topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
    .topbar h1{font-size:1.5rem;font-weight:800;color:var(--text)}
    .topbar-right{display:flex;align-items:center;gap:10px}
    .theme-btn{background:var(--surface);border:1.5px solid var(--border);color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:transform .3s}
    .theme-btn:hover{transform:rotate(20deg)}
    .admin-badge{background:rgba(0,87,255,.1);color:var(--primary);font-size:.75rem;font-weight:700;padding:4px 12px;border-radius:20px;border:1px solid rgba(0,87,255,.2)}
    /* ✅ FIX 3: Session timer display */
    .session-timer{font-size:.75rem;color:var(--text-muted);padding:4px 10px;border:1px solid var(--border);border-radius:20px;}
    .session-timer.warn{color:#d97706;border-color:#d97706}
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:22px}
    .stat-card{background:var(--surface);border-radius:16px;padding:18px 20px;border:1px solid var(--border);box-shadow:var(--shadow-sm)}
    .sc-lbl{font-size:.78rem;color:var(--text-muted);font-weight:600;margin-bottom:5px}
    .sc-val{font-family: 'Space Grotesk',sans-serif;font-size:1.9rem;font-weight:800;color:var(--primary)}
    .sc-sub{font-size:.73rem;color:var(--text-muted);margin-top:3px}
    .section{display:none}
    .section.active{display:block}
    .chart-row{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-bottom:20px}
    .chart-card{background:var(--surface);border-radius:18px;border:1px solid var(--border);padding:20px 22px;box-shadow:var(--shadow-sm)}
    .chart-card h3{font-size:.95rem;font-weight:700;color:var(--text);margin-bottom:16px}
    .table-title{font-family: 'Space Grotesk',sans-serif;font-weight:700;font-size:1rem;color:var(--text)}
    .table-actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    .search-input{padding:7px 14px;border:1.5px solid var(--border);border-radius:30px;font-family:'Manrope',sans-serif;font-size:.83rem;background:var(--surface2);color:var(--text);outline:none;width:170px}
    table{width:100%;border-collapse:collapse}
    th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:.76rem;font-weight:700;color:var(--text-muted);text-transform:uppercase;letter-spacing:.04em}
    td{padding:12px 14px;border-bottom:1px solid var(--border);font-size:.84rem;color:var(--text);vertical-align:middle}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:rgba(0,87,255,.02)}
    .empty-row td{text-align:center;color:var(--text-muted);padding:36px;font-size:.88rem}
    .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
    .badge-pending{background:rgba(251,191,36,.15);color:#d97706}
    .badge-confirmed{background:rgba(0,87,255,.12);color:var(--primary)}
    .badge-assigned{background:rgba(124,58,237,.12);color:#7c3aed}
    .badge-packing{background:rgba(14,165,233,.12);color:#0ea5e9}
    .badge-transit{background:rgba(249,115,22,.12);color:#f97316}
    .badge-delivered{background:rgba(0,201,110,.12);color:var(--accent)}
    .btn-sm{padding:5px 12px;border-radius:18px;border:none;font-family:'Manrope',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;transition:all .2s}
    .btn-assign{background:rgba(0,87,255,.1);color:var(--primary)}
    .btn-assign:hover{background:var(--primary);color:#fff}
    .btn-export{background:rgba(0,201,110,.1);color:var(--accent);border:1.5px solid rgba(0,201,110,.3);padding:7px 14px;border-radius:30px;font-family:'Manrope',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:background .2s}
    .btn-export:hover{background:var(--accent);color:#fff}
    .btn-primary-sm{background:var(--primary);color:#fff;padding:7px 16px;border:none;border-radius:30px;font-family:'Manrope',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;transition:background .2s}
    .btn-primary-sm:hover{background:#0040cc}
    select.status-sel{padding:4px 10px;border:1.5px solid var(--border);border-radius:18px;font-family:'Manrope',sans-serif;font-size:.76rem;font-weight:600;background:var(--surface2);color:var(--text);cursor:pointer;outline:none}
    .driver-card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:18px 22px;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;box-shadow:var(--shadow-sm);margin-bottom:14px}
    .driver-info{display:flex;align-items:center;gap:14px}
    .driver-avatar{width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--primary),#7c3aed);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.2rem;font-weight:800;font-family: 'Space Grotesk',sans-serif;flex-shrink:0}
    .driver-name{font-weight:700;color:var(--text);font-size:.95rem}
    .driver-meta{font-size:.8rem;color:var(--text-muted);margin-top:2px}
    .online-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:5px}
    .online-dot.on{background:var(--accent);box-shadow:0 0 5px rgba(0,201,110,.6)}
    .online-dot.off{background:var(--text-muted)}
    .assign-overlay{position:fixed;inset:0;background:rgba(5,13,26,.75);backdrop-filter:blur(8px);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px}
    .assign-box{background:var(--surface);border-radius:20px;padding:32px;max-width:420px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.3)}
    .assign-title{font-family: 'Space Grotesk',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);margin-bottom:16px}
    .assign-info{background:var(--surface2);border-radius:12px;padding:14px;border:1px solid var(--border);font-size:.86rem;color:var(--text);line-height:1.8;margin-bottom:16px}
    .btn-row{display:flex;gap:10px;margin-top:18px}
    .btn-cancel{flex:1;padding:11px;background:var(--surface2);color:var(--text-muted);border:1.5px solid var(--border);border-radius:50px;font-family:'Manrope',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer}
    .btn-confirm{flex:2;padding:11px;background:var(--primary);color:#fff;border:none;border-radius:50px;font-family:'Manrope',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;box-shadow:0 5px 16px rgba(0,87,255,.3)}
    .promo-form{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    .promo-form input,.promo-form select{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Manrope',sans-serif;font-size:.88rem;background:var(--surface2);color:var(--text);outline:none}
    .promo-form input:focus,.promo-form select:focus{border-color:var(--primary)}
    .bulk-textarea{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:12px;font-family:'Manrope',sans-serif;font-size:.9rem;color:var(--text);background:var(--surface2);outline:none;resize:vertical;min-height:80px;margin-bottom:10px}
    .bulk-textarea:focus{border-color:var(--primary)}
    .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--dark);color:#fff;padding:12px 24px;border-radius:50px;font-size:.9rem;font-weight:600;z-index:99999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap}
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
    .driver-form-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:14px}
    .driver-form-grid input,.driver-form-grid select{padding:10px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:'Manrope',sans-serif;font-size:.88rem;background:var(--surface2);color:var(--text);outline:none;width:100%}
    .driver-form-grid input:focus,.driver-form-grid select:focus{border-color:var(--primary)}
    .driver-form-actions{display:flex;align-items:flex-end}
    #adminDriverMsg{min-height:18px;font-size:.83rem;margin-top:6px;font-weight:600}
    .table-card{background:var(--surface);border-radius:18px;border:1px solid var(--border);box-shadow:var(--shadow-sm);overflow-x:auto;margin-bottom:20px}
    .table-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:8px}
    @media(max-width:768px){
      .admin-shell.active{flex-direction:column}
      .sidebar{position:static;width:100%;flex-direction:row;padding:10px;height:auto;flex-wrap:nowrap;overflow-x:auto}
      .admin-main{margin-left:0}
      .sidebar-logo,.sb-role,.sidebar-bottom{display:none}
      .nav-item{padding:8px 12px;font-size:.78rem;border-left:none;border-bottom:3px solid transparent}
      .nav-item.active{border-left:none;border-bottom-color:var(--primary)}
      .chart-row{grid-template-columns:1fr}
      .driver-form-grid{grid-template-columns:1fr}
      .topbar{flex-direction:column;align-items:flex-start;gap:12px}
      .topbar-right{width:100%;justify-content:space-between}
    }
  </style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div class="admin-login" id="adminLogin">
  <div class="login-card">
    <div class="login-logo">📦 PackZen <span style="color:var(--text-muted);font-size:.9rem;font-weight:500;">Admin</span></div>
    <p class="login-sub">Restricted — admin access only</p>

    <!-- ✅ FIX: autocomplete off prevents browser from suggesting admin credentials to non-admins -->
    <label class="field-label">Email</label>
    <input id="adminEmail" type="email" class="field-input" placeholder="admin@packzen.com" autocomplete="off">
    <label class="field-label">Password</label>
    <input id="adminPass" type="password" class="field-input" placeholder="Password" autocomplete="off">

    <div id="adminErr" class="auth-err"></div>
    <div class="lockout-banner" id="lockoutBanner">🔒 Too many failed attempts. Please wait <span id="lockoutTimer">30</span>s before trying again.</div>

    <button class="btn-auth" id="loginBtn" onclick="adminLogin()">Login to Dashboard →</button>
  </div>
</div>

<!-- ✅ FIX 2: Admin shell is EMPTY until auth passes — injected by buildShell() -->
<div class="admin-shell" id="adminShell"></div>

<div class="toast" id="adminToast"></div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

<script src="env-config.js"></script>
<script src="firebase-config.js"></script>

<script>
/* ================================================================
   ✅ SECURITY CONSTANTS
   ================================================================ */
const ADMIN_EMAILS = [
  "admin@packzen.com",
  "support@packzenblr.in",
  "azharahmedm786@gmail.com",
  "moveeasyblr@gmail.com"
];

/* ✅ FIX 3: Brute-force rate limiter
   Max 3 failed attempts → 30s lockout, stored in sessionStorage
   so it resets on tab close but persists within the session. */
const RATE_KEY   = "pz_admin_attempts";
const LOCK_KEY   = "pz_admin_lockout";
const MAX_TRIES  = 3;
const LOCKOUT_MS = 30 * 1000; // 30 seconds

function getRateData() {
  try { return JSON.parse(sessionStorage.getItem(RATE_KEY)) || { count: 0 }; } catch(e) { return { count: 0 }; }
}
function setRateData(d) { try { sessionStorage.setItem(RATE_KEY, JSON.stringify(d)); } catch(e) {} }
function getLockout()   { try { return parseInt(sessionStorage.getItem(LOCK_KEY) || "0"); } catch(e) { return 0; } }
function setLockout(ts) { try { sessionStorage.setItem(LOCK_KEY, String(ts)); } catch(e) {} }

function isLockedOut() {
  const until = getLockout();
  return until > Date.now();
}

function recordFailedAttempt() {
  const d = getRateData();
  d.count = (d.count || 0) + 1;
  setRateData(d);
  if (d.count >= MAX_TRIES) {
    setLockout(Date.now() + LOCKOUT_MS);
    setRateData({ count: 0 });
    startLockoutTimer();
  }
}

function clearAttempts() {
  try { sessionStorage.removeItem(RATE_KEY); sessionStorage.removeItem(LOCK_KEY); } catch(e) {}
}

let lockoutInterval = null;
function startLockoutTimer() {
  const banner = document.getElementById("lockoutBanner");
  const span   = document.getElementById("lockoutTimer");
  const btn    = document.getElementById("loginBtn");
  if (banner) banner.style.display = "block";
  if (btn) btn.disabled = true;
  if (lockoutInterval) clearInterval(lockoutInterval);
  lockoutInterval = setInterval(() => {
    const remaining = Math.ceil((getLockout() - Date.now()) / 1000);
    if (remaining <= 0) {
      clearInterval(lockoutInterval);
      if (banner) banner.style.display = "none";
      if (btn) btn.disabled = false;
      return;
    }
    if (span) span.textContent = remaining;
  }, 500);
}

// Resume lockout if page was refreshed during lockout window
if (isLockedOut()) startLockoutTimer();

/* ✅ FIX 4: Session timeout — 2 hours
   Stored in sessionStorage so it resets on tab close. */
const SESSION_KEY      = "pz_admin_session_start";
const SESSION_LIMIT_MS = 2 * 60 * 60 * 1000; // 2 hours
const WARN_BEFORE_MS   = 10 * 60 * 1000;      // warn 10 min before

let sessionInterval = null;

function startSessionTimer() {
  try { sessionStorage.setItem(SESSION_KEY, String(Date.now())); } catch(e) {}
  sessionInterval = setInterval(() => {
    const start = parseInt(sessionStorage.getItem(SESSION_KEY) || "0");
    if (!start) return;
    const elapsed   = Date.now() - start;
    const remaining = SESSION_LIMIT_MS - elapsed;
    const timerEl   = document.getElementById("sessionTimerDisplay");
    if (!timerEl) return;
    if (remaining <= 0) {
      clearInterval(sessionInterval);
      toast("⏱️ Session expired. Signing out for security.");
      setTimeout(() => adminSignOut(), 1500);
      return;
    }
    const mins = Math.floor(remaining / 60000);
    timerEl.textContent = "Session: " + mins + "m";
    timerEl.className   = "session-timer" + (remaining < WARN_BEFORE_MS ? " warn" : "");
  }, 30000);
}

/* ================================================================
   FIREBASE HELPER
   ================================================================ */
function waitFB(cb, n=0) {
  if (window._firebase) { cb(); return; }
  if (n > 30) {
    const err = document.getElementById("adminErr");
    if (err) err.textContent = "Firebase failed to load. Check your connection and refresh.";
    const btn = document.getElementById("loginBtn");
    if (btn) { btn.disabled = false; btn.textContent = "Login to Dashboard →"; }
    return;
  }
  setTimeout(() => waitFB(cb, n+1), 200);
}

/* ================================================================
   AUTO-LOGIN GUARD (checks if already signed in as admin on load)
   ================================================================ */
document.addEventListener("DOMContentLoaded", () => {
  waitFB(() => {
    const { auth, db } = window._firebase;
    auth.onAuthStateChanged(async (user) => {
      if (!user) return; // Not logged in — show login form, nothing else
      const userEmail = (user.email || "").toLowerCase();
      try {
        const snap = await db.collection("users").doc(user.uid).get();
        const data = snap.data() || {};
        if (data.role === "admin" || ADMIN_EMAILS.includes(userEmail)) {
          adminUser = user;
          showShell(data.name || user.displayName || "Admin");
        }
        // If not admin role — do nothing (don't redirect, just show login)
      } catch(e) {
        if (ADMIN_EMAILS.includes(userEmail)) {
          adminUser = user;
          showShell(user.displayName || "Admin");
        }
      }
    });
  });
});

/* ================================================================
   LOGIN — WITH RATE LIMITING
   ================================================================ */
function adminLogin() {
  // ✅ Block if locked out
  if (isLockedOut()) { startLockoutTimer(); return; }

  const email = document.getElementById("adminEmail").value.trim().toLowerCase();
  const pass  = document.getElementById("adminPass").value;
  const err   = document.getElementById("adminErr");
  const btn   = document.getElementById("loginBtn");
  err.textContent = ""; err.style.color = "#ef4444";

  if (!email || !pass) { err.textContent = "Please enter email and password."; return; }

  btn.disabled = true; btn.textContent = "Signing in...";

  waitFB(() => {
    const { auth, db } = window._firebase;
    auth.signInWithEmailAndPassword(email, pass)
      .then(cred => {
        adminUser = cred.user;
        const userEmail = cred.user.email?.toLowerCase() || "";
        db.collection("users").doc(cred.user.uid).get()
          .then(async doc => {
            const role = doc.exists ? doc.data()?.role : null;
            const name = doc.exists ? (doc.data()?.name || "Admin") : "Admin";
            if (role === "admin" || ADMIN_EMAILS.includes(userEmail)) {
              // Auto-fix missing role in Firestore
              if (ADMIN_EMAILS.includes(userEmail) && role !== "admin") {
                try {
                  if (doc.exists) {
                    await db.collection("users").doc(cred.user.uid).update({ role: "admin" });
                  } else {
                    await db.collection("users").doc(cred.user.uid).set({
                      name: cred.user.displayName || "Admin", email: userEmail,
                      role: "admin", createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                  }
                } catch(e) { console.warn("Could not set admin role:", e.message); }
              }
              clearAttempts(); // ✅ Reset attempts on successful login
              showShell(name);
            } else {
              auth.signOut(); adminUser = null;
              recordFailedAttempt(); // ✅ Count as failed — wrong role
              err.textContent = "Access denied. Your account does not have admin permissions.";
            }
          })
          .catch(e => {
            console.error('Admin Auth Firestore Error:', e.code, e.message);
            if (ADMIN_EMAILS.includes(userEmail)) {
              clearAttempts();
              showShell(cred.user.displayName || "Admin");
            } else {
              auth.signOut(); adminUser = null;
              recordFailedAttempt();
              err.textContent = "Could not verify admin role. Please contact support.";
            }
          });
      })
      .catch(e => {
        console.error('Admin Auth Error:', e.code, e.message);
        recordFailedAttempt(); // ✅ Count failed attempt
        const d = getRateData();
        const remaining = MAX_TRIES - d.count;
        if      (e.code === "auth/wrong-password" || e.code === "auth/invalid-credential")
          err.textContent = `Wrong password. ${remaining > 0 ? remaining + " attempt(s) remaining." : ""}`;
        else if (e.code === "auth/user-not-found")
          err.textContent = "No account found with this email.";
        else if (e.code === "auth/invalid-email")
          err.textContent = "Invalid email address.";
        else if (e.code === "auth/too-many-requests")
          err.textContent = "Too many attempts. Please wait a few minutes.";
        else
          err.textContent = e.message;
      })
      .finally(() => { btn.disabled = false; btn.textContent = "Login to Dashboard →"; });
  });
}

/* ================================================================
   SIGN OUT
   ================================================================ */
function adminSignOut() {
  if (sessionInterval) clearInterval(sessionInterval);
  try { sessionStorage.removeItem(SESSION_KEY); } catch(e) {}
  waitFB(() => window._firebase.auth.signOut().then(() => {
    // ✅ FIX: Clear the shell HTML on sign out — no admin UI left in DOM
    const shell = document.getElementById("adminShell");
    if (shell) { shell.classList.remove("active"); shell.innerHTML = ""; }
    document.getElementById("adminLogin").style.display = "flex";
    adminUser = null; allBookings=[]; allDrivers=[]; allCustomers=[]; allReviews=[]; allPromos=[];
  }));
}

/* ── ANALYTICS ── */
let analyticsTrendsChart = null, analyticsRoutesChart = null;
function renderAnalytics() {
  const el = id => document.getElementById(id);
  if (!el("analyticsTotalRev")) return;

  // Basic KPIs
  const totalRev = allBookings.reduce((s, b) => s + (b.total || 0), 0);
  const avgVal = allBookings.length ? Math.round(totalRev / allBookings.length) : 0;
  const convRate = allCustomers.length ? ((allBookings.length / allCustomers.length) * 100).toFixed(1) : 0;

  const currentMonth = new Date().getMonth();
  const currentYear = new Date().getFullYear();
  const newCustomersThisMonth = allCustomers.filter(c => {
    const d = c.createdAt?.toDate ? c.createdAt.toDate() : null;
    return d && d.getMonth() === currentMonth && d.getFullYear() === currentYear;
  }).length;

  el("analyticsTotalRev").textContent = "₹" + totalRev.toLocaleString("en-IN");
  el("analyticsAvgValue").textContent = "₹" + avgVal.toLocaleString("en-IN");
  el("analyticsConvRate").textContent = convRate + "%";
  el("analyticsCustGrowth").textContent = "+" + newCustomersThisMonth;

  // Monthly Reports & Trends
  const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const bByMonth = new Array(12).fill(0), rByMonth = new Array(12).fill(0);
  allBookings.forEach(b => {
    const d = b.createdAt?.toDate ? b.createdAt.toDate() : null;
    if (!d) return;
    bByMonth[d.getMonth()]++;
    rByMonth[d.getMonth()] += b.total || 0;
  });

  const tbody = el("analyticsMonthlyTable");
  tbody.innerHTML = monthNames.map((m, i) => {
    if (!bByMonth[i] && !rByMonth[i]) return "";
    const avg = bByMonth[i] ? Math.round(rByMonth[i] / bByMonth[i]) : 0;
    return `<tr>
      <td style="font-weight:600">${m}</td>
      <td>${bByMonth[i]}</td>
      <td style="color:#00c96e;font-weight:600">₹${rByMonth[i].toLocaleString("en-IN")}</td>
      <td>₹${avg.toLocaleString("en-IN")}</td>
    </tr>`;
  }).filter(Boolean).join("") || '<tr class="empty-row"><td colspan="4">No data yet</td></tr>';

  // Popular Routes
  const routeCounts = {};
  allBookings.forEach(b => {
    const p = (b.pickup||"").split(",")[0].trim();
    const d = (b.drop||"").split(",")[0].trim();
    if (p && d) {
      const r = p + " → " + d;
      routeCounts[r] = (routeCounts[r] || 0) + 1;
    }
  });
  const sortedRoutes = Object.entries(routeCounts).sort((a,b)=>b[1]-a[1]).slice(0, 5);
  const routeLabels = sortedRoutes.map(x => x[0].length > 15 ? x[0].substring(0, 15) + "..." : x[0]);
  const routeData = sortedRoutes.map(x => x[1]);

  // Charts
  const isDark = document.body.classList.contains("dark");
  const gridColor  = isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)";
  const labelColor = isDark ? "#8a9bbf" : "#5a6a8a";
  const commonOpt = { responsive:true, plugins:{ legend:{ display:false } }, scales:{ x:{ grid:{ color:gridColor }, ticks:{ color:labelColor, font:{ size:10 } } }, y:{ grid:{ color:gridColor }, ticks:{ color:labelColor, font:{ size:10 } } } } };

  const ctxT = document.getElementById("analyticsTrendsChart");
  const ctxR = document.getElementById("analyticsRoutesChart");
  if (ctxT && ctxR) {
    if (analyticsTrendsChart) analyticsTrendsChart.destroy();
    if (analyticsRoutesChart) analyticsRoutesChart.destroy();

    analyticsTrendsChart = new Chart(ctxT, {

/* ── PARCEL MANAGEMENT ── */
let allParcelBookings = [];
function loadParcelBookings() {
  window._firebase.db.collection("parcelBookings").orderBy("createdAt", "desc").get().then(snap => {
    allParcelBookings = [];
    let rev = 0, completed = 0, active = 0;
    snap.forEach(doc => {
      const d = doc.data();
      d.id = doc.id;
      allParcelBookings.push(d);
      if (d.status === 'delivered') { completed++; rev += (d.totalFare || 0); }
      else if (d.status !== 'cancelled') active++;
    });
    document.getElementById("parcelTotalOrders").textContent = allParcelBookings.length;
    document.getElementById("parcelRevenue").textContent = "₹" + rev.toLocaleString('en-IN');
    document.getElementById("parcelCompleted").textContent = completed;
    document.getElementById("parcelActive").textContent = active;
    renderParcelBookings(allParcelBookings);
  });
}
function renderParcelBookings(list) {
  const tb = document.getElementById("parcelTable");
  tb.innerHTML = "";
  if (!list.length) return tb.innerHTML="<tr class='empty-row'><td colspan='7'>No parcel bookings found.</td></tr>";
  list.forEach(b => {
    const d = b.createdAt ? b.createdAt.toDate().toLocaleDateString('en-IN') : "--";
    const st = b.status || "confirmed";
    const stColor = st==="delivered"?"color:#16a34a":st==="cancelled"?"color:#dc2626":"color:#d97706";
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td style="font-family:'Space Grotesk',sans-serif;font-weight:700;">${b.bookingId||b.id}</td>
      <td><b>${b.customerName||"--"}</b><br><small style="color:var(--text-muted)">${b.customerPhone||"--"}</small></td>
      <td><span class="truncate" style="display:inline-block;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${b.pickupAddress}">${b.pickupAddress||"--"}</span></td>
      <td><span class="truncate" style="display:inline-block;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${b.deliveryAddress}">${b.deliveryAddress||"--"}</span></td>
      <td style="font-weight:700;">₹${b.totalFare||0}</td>
      <td style="font-weight:700;text-transform:capitalize;${stColor}">${st}</td>
      <td style="font-size:0.85rem;color:var(--text-muted);">${d}</td>
    `;
    tb.appendChild(tr);
  });
}
function filterParcel(query) {
  query = query.toLowerCase();
  const f = allParcelBookings.filter(b =>
    (b.bookingId&&b.bookingId.toLowerCase().includes(query)) ||
    (b.customerPhone&&b.customerPhone.includes(query)) ||

}

/* ── STATS ── */
function updateStats() {
  const el = id => document.getElementById(id);
  if (!el("statToday")) return;
  const today = new Date().toLocaleDateString("en-IN");
  el("statToday").textContent     = allBookings.filter(b => b.date === today).length;
  el("statPending").textContent   = allBookings.filter(b => b.status === "pending").length;
  el("statCancelled").textContent  = allBookings.filter(b => b.status === "cancelled").length;
  el("statDelivered").textContent = allBookings.filter(b => b.status === "delivered").length;
  const rev = allBookings.reduce((s, b) => s + (b.total || 0), 0);
  el("statRevenue").textContent = "₹" + (rev >= 100000 ? (rev/100000).toFixed(1)+"L" : rev.toLocaleString("en-IN"));
  const onlineDrivers = allDrivers.filter(d => d.isOnline).length;
  el("statDrivers").textContent = `${onlineDrivers}/${allDrivers.length}`;
}

/* ── CHARTS ── */
function renderCharts() {
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const bookingsByMonth = new Array(12).fill(0), revenueByMonth = new Array(12).fill(0);
  allBookings.forEach(b => {
    const d = b.createdAt?.toDate ? b.createdAt.toDate() : null;
    if (!d) return;
    bookingsByMonth[d.getMonth()]++;
    revenueByMonth[d.getMonth()] += b.total || 0;
  });
  const isDark = document.body.classList.contains("dark");
  const gridColor  = isDark ? "rgba(255,255,255,0.08)" : "rgba(0,0,0,0.06)";
  const labelColor = isDark ? "#8a9bbf" : "#5a6a8a";
  const cfg = (label, data, color) => ({
    type:"bar", data:{ labels:months, datasets:[{ label, data, backgroundColor:color+"88", borderColor:color, borderWidth:2, borderRadius:6 }] },
    options:{ responsive:true, plugins:{ legend:{ display:false } }, scales:{ x:{ grid:{ color:gridColor }, ticks:{ color:labelColor, font:{ size:10 } } }, y:{ grid:{ color:gridColor }, ticks:{ color:labelColor, font:{ size:10 } } } } }
  });
  const ctx1 = document.getElementById("bookingsChart");
  const ctx2 = document.getElementById("revenueChart");
  if (!ctx1 || !ctx2) return;
  if (bookingsChart) bookingsChart.destroy();
  if (revenueChart)  revenueChart.destroy();
  bookingsChart = new Chart(ctx1, cfg("Bookings", bookingsByMonth, "#0057ff"));
  revenueChart  = new Chart(ctx2, cfg("Revenue",  revenueByMonth,  "#00c96e"));
}

function filterBookings(q) {
  q = (q || "").toLowerCase();
  const statusFilterEl = document.getElementById("filterStatus");
  const status = statusFilterEl ? statusFilterEl.value : "all";

  filteredBookings = allBookings.filter(b => {
    const matchesSearch = (b.customerName || "").toLowerCase().includes(q) ||
      (b.id || "").toLowerCase().includes(q) ||
      (b.bookingRef || "").toLowerCase().includes(q) ||
      (b.phone || "").includes(q);
    const matchesStatus = status === "all" || b.status === status;
    return matchesSearch && matchesStatus;
  });

  renderBookingsTable(filteredBookings);
}
function updateStatus(id, status) {
  requireAdmin(() => {
    window._firebase.db.collection("bookings").doc(id).update({ status })
      .then(() => toast("✅ Status → " + cap(status)))
      .catch(e => toast("❌ " + e.message));
  });
}
function deleteBooking(id, ref) {
  requireAdmin(() => {
    if (!confirm(`⚠️ Permanently delete booking #${ref}?\n\nThis cannot be undone.`)) return;
    window._firebase.db.collection("bookings").doc(id).delete()
      .then(() => toast("🗑️ Booking #" + ref + " deleted"))
      .catch(e => toast("❌ " + e.message));
  });
}
function exportCSV() {
  const headers = ["ID","Customer","Phone","Pickup","Drop","Date","Total","Status","Driver"];
  const rows = filteredBookings.map(b => [

    b.date||"", b.total||0, b.status||"", b.driverName||""
  ]);
  const csv = [headers, ...rows].map(r => r.join(",")).join("\n");
  const a = document.createElement("a");

function showSection(name, el) {
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(n=>n.classList.remove("active"));
  const sec = document.getElementById("section"+cap(name));

  if (el) el.classList.add("active");
  const titles = { overview:"Overview", bookings:"Bookings", parcel:"Parcel Management", drivers:"Drivers", customers:"Customers", reviews:"Reviews", cancels:"Cancellations", claims:"Damage Claims", promos:"Promo Codes", broadcast:"Broadcast", analytics:"Business Analytics" };

function escapeHTML(str) {
  if (!str) return "";
  return String(str).replace(/[&<>'"]/g, tag => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
  }[tag]));
}

/* ── ACCOUNT DELETION REQUESTS ── */
async function loadDeletionRequests() {
  const tbody = document.getElementById("deletionTable");
  if (!tbody || !window._firebase) return;
  tbody.innerHTML = "<tr><td colspan='6' style='text-align:center;padding:1rem'>Loading...</td></tr>";
  try {
    const snap = await window._firebase.db.collection("accountDeletionRequests").orderBy("createdAt", "desc").limit(100).get();
    if (snap.empty) {
      tbody.innerHTML = "<tr class='empty-row'><td colspan='6'>No deletion requests yet.</td></tr>";
      return;
    }

    const statusColor = { "Pending": "#d97706", "Processed": "#16a34a", "Rejected": "#dc2626" };

    tbody.innerHTML = snap.docs.map(doc => {
      const data = doc.data();
      const reqId = doc.id;
      const date = data.createdAt?.toDate?.().toLocaleDateString("en-IN") || "—";
      const safeFirst = escapeHTML(data.firstName);
      const safeLast = escapeHTML(data.lastName);
      const safeEmail = escapeHTML(data.email);
      const safePhone = escapeHTML(data.phone);
      const name = `${safeFirst} ${safeLast}`.trim() || "—";
      const contact = `${safeEmail || '—'}<br><small style="color:var(--text-muted)">${safePhone || '—'}</small>`;
      const status = escapeHTML(data.status) || "Pending";
      const sColor = statusColor[status] || "#d97706";

      let actions = `<button class="btn-action" style="background:#2563eb;color:white" onclick="viewDeletionRequest('${reqId}')">View</button>`;

      if (status === "Pending") {
         actions += `<button class="btn-action" style="background:#16a34a;color:white;margin-left:4px" onclick="updateDeletionStatus('${reqId}', 'Processed')">Approve & Process</button>
                     <button class="btn-action" style="background:#dc2626;color:white;margin-left:4px" onclick="updateDeletionStatus('${reqId}', 'Rejected')">Reject</button>`;
      }

      actions += `<button class="btn-action" style="background:#ef4444;color:white;margin-left:4px;opacity:0.8" onclick="deleteDeletionRequest('${reqId}')">🗑️</button>`;

      return `<tr>
        <td style="font-family:'Space Grotesk',sans-serif;font-weight:600;">${reqId}</td>
        <td>${name}</td>
        <td>${contact}</td>
        <td>${date}</td>
        <td><span style="display:inline-block;padding:2px 8px;border-radius:12px;font-size:0.8rem;background:${sColor}20;color:${sColor};font-weight:600;">${status}</span></td>
        <td>${actions}</td>
      </tr>`;
    }).join("");
  } catch (err) {
    console.error("Error loading deletion requests:", err);
    tbody.innerHTML = "<tr class='empty-row'><td colspan='6' style='color:red;'>Failed to load. See console.</td></tr>";
  }
}

async function viewDeletionRequest(reqId) {
  try {
    const doc = await window._firebase.db.collection("accountDeletionRequests").doc(reqId).get();
    if (!doc.exists) return toast("⚠️ Request not found.");
    const data = doc.data();

    const details = `
      <b>Name:</b> ${escapeHTML(data.firstName)} ${escapeHTML(data.lastName)}<br>
      <b>Email:</b> ${escapeHTML(data.email)}<br>
      <b>Phone:</b> ${escapeHTML(data.phone)}<br>
      <b>Reason:</b> ${escapeHTML(data.reason) || "None provided"}<br>
      <b>Date:</b> ${data.createdAt?.toDate?.().toLocaleString("en-IN") || "—"}<br>
      <b>Status:</b> ${escapeHTML(data.status)}<br>
      ${data.processedAt ? `<b>Processed At:</b> ${data.processedAt.toDate().toLocaleString("en-IN")}<br>` : ""}
      ${data.processedBy ? `<b>Processed By:</b> ${escapeHTML(data.processedBy)}<br>` : ""}
      ${data.userId ? `<b>User ID:</b> ${escapeHTML(data.userId)}<br>` : ""}
    `;

    // Using a simple alert since there's no pre-built modal for this specifically
    // In a real scenario we'd use a modal, but alert/toast or custom overlay works
    const html = `<div style="text-align:left;line-height:1.6;font-size:0.95rem">${details}</div>`;

    // We can piggyback on the general modal if it exists, but let's just create a quick overlay
    const overlay = document.createElement("div");
    overlay.style.position = "fixed"; overlay.style.top = "0"; overlay.style.left = "0"; overlay.style.width = "100%"; overlay.style.height = "100%";
    overlay.style.background = "rgba(0,0,0,0.6)"; overlay.style.zIndex = "99999"; overlay.style.display = "flex"; overlay.style.alignItems = "center"; overlay.style.justifyContent = "center";

    overlay.innerHTML = `
      <div style="background:var(--bg-primary, white); padding:2rem; border-radius:12px; max-width:500px; width:90%; color:var(--text-primary, black);">
        <h2 style="margin-top:0;font-family:'Space Grotesk',sans-serif">Request Details</h2>
        ${html}
        <button onclick="this.parentElement.parentElement.remove()" style="margin-top:1.5rem;background:var(--accent,#2563eb);color:white;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;">Close</button>
      </div>
    `;
    document.body.appendChild(overlay);

  } catch (err) {
    console.error("View error:", err);
    toast("❌ Failed to load request details.");
  }
}

async function updateDeletionStatus(reqId, newStatus) {
  if (!confirm(`Are you sure you want to mark this request as ${newStatus}?`)) return;
  try {
    const processedBy = window._firebase.auth.currentUser ? window._firebase.auth.currentUser.email : "Admin";
    await window._firebase.db.collection("accountDeletionRequests").doc(reqId).update({
      status: newStatus,
      processedAt: firebase.firestore.FieldValue.serverTimestamp(),
      processedBy: processedBy
    });
    toast(`✅ Request marked as ${newStatus}`);
    loadDeletionRequests();
  } catch (err) {
    console.error("Update error:", err);
    toast("❌ Failed to update request status.");
  }
}

async function deleteDeletionRequest(reqId) {
  if (!confirm("Are you sure you want to permanently delete this request record?")) return;
  try {
    await window._firebase.db.collection("accountDeletionRequests").doc(reqId).delete();
    toast("🗑️ Request deleted");
    loadDeletionRequests();
  } catch (err) {
    console.error("Delete error:", err);
    toast("❌ Failed to delete request.");
  }
}

async function adminCreateDriver() {
  const name     = (document.getElementById("newDriverName")||{}).value||"";
  const email    = (document.getElementById("newDriverEmail")||{}).value||"";
  const phone    = (document.getElementById("newDriverPhone")||{}).value||"";
  const vehicle  = (document.getElementById("newDriverVehicle")||{}).value||"";
  const password = (document.getElementById("newDriverPassword")||{}).value||"";
  const msgEl    = document.getElementById("adminDriverMsg");
  const setMsg   = (text, ok) => { if(msgEl){ msgEl.textContent=text; msgEl.style.color=ok?"#16a34a":"#e53e3e"; } };
  if (!name.trim()) return setMsg("⚠️ Please enter the driver's full name.", false);
  if (!email.trim() || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.trim())) return setMsg("⚠️ Please enter a valid email address.", false);
  if (phone.trim() && phone.trim().length!==10) return setMsg("⚠️ Phone must be 10 digits (or leave it blank).", false);
  if (password.length < 6) return setMsg("⚠️ Password must be at least 6 characters.", false);
  setMsg("⏳ Creating driver account...", true);
  const btn = document.querySelector('[onclick="adminCreateDriver()"]');
  if (btn) { btn.disabled=true; btn.textContent="Creating..."; }
  try {
    const { db } = window._firebase;
    const secondaryApp  = firebase.initializeApp(firebase.app().options, "adminDriver_"+Date.now());
    const secondaryAuth = secondaryApp.auth();
    const cred      = await secondaryAuth.createUserWithEmailAndPassword(email.trim(), password);
    const driverUid = cred.user.uid;
    await secondaryAuth.signOut();
    await secondaryApp.delete();
    await db.collection("users").doc(driverUid).set({ name:name.trim(), email:email.trim(), phone:phone.trim()?"+91"+phone.trim():"", vehicle:vehicle||"", role:"driver", isOnline:false, rating:0, totalMoves:0, createdBy:adminUser?adminUser.uid:"admin", createdAt:firebase.firestore.FieldValue.serverTimestamp() });
    setMsg('✅ Driver "'+name.trim()+'" created! They can now log in at driver.html', true);
    toast("✅ Driver account created for "+name.trim());
    ["newDriverName","newDriverEmail","newDriverPhone","newDriverVehicle","newDriverPassword"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
    loadDrivers();
  } catch(err) {
    if      (err.code==="auth/email-already-in-use") setMsg("⚠️ A driver with this email already exists.", false);
    else if (err.code==="auth/invalid-email")        setMsg("⚠️ Invalid email address format.", false);
    else if (err.code==="auth/weak-password")        setMsg("⚠️ Password is too weak. Use at least 6 characters.", false);
    else setMsg("⚠️ "+(err.message||"Failed to create driver."), false);
  } finally {
    if (btn) { btn.disabled=false; btn.textContent="✅ Create Driver Account"; }
  }
}

    doc.setFontSize(10);
    doc.text("Description", 16, yPos);
    doc.text("Amount (INR)", 160, yPos);
    yPos += 8;

    doc.setFont("helvetica", "normal");

    const bd = b.quoteBreakdown || {};

    const addCharge = (label, amount) => {
      if (amount > 0) {
        doc.text(label, 16, yPos);
        doc.text(`Rs. ${fmt(amount)}`, 160, yPos);
        yPos += 6;
      }
    };

    if (bd.baseFare) addCharge("Base Fare", bd.baseFare);
    else if (b.total) addCharge("Move Charge", b.originalTotal || b.total);

    addCharge("Distance Charge", bd.distanceCharge);
    addCharge("Floor & Handling Charge", bd.floorCharge);
    addCharge("Packing Service", bd.packingCharge);
    addCharge("Furniture & Assembly", bd.furnitureCharge);
    addCharge("Carton Boxes", bd.cartonCharge);

    if (bd.surcharges && bd.surcharges.length > 0) {
       bd.surcharges.forEach(s => addCharge(`Surcharge (${s.label})`, s.amount));
    }

    if (b.promoDiscount > 0 || bd.discount > 0) {
      doc.setTextColor(22, 163, 74); // Green
      addCharge("Discount", -(b.promoDiscount || bd.discount));
      doc.setTextColor(0, 0, 0);
    }

    // Line separator
    yPos += 2;
    doc.setDrawColor(200, 200, 200);
    doc.line(14, yPos, 196, yPos);
    yPos += 6;

    // Total
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.text("Grand Total:", 120, yPos);
    doc.text(`Rs. ${fmt(b.total)}`, 160, yPos);

    yPos += 15;

    // --- Payment Info ---
    doc.setFont("helvetica", "bold");
    doc.setFontSize(12);
    doc.text("Payment Details", 14, yPos);
    yPos += 6;
    doc.setFontSize(10);
    doc.setFont("helvetica", "normal");

    let paymentMethod = "Pay Later / Cash";
    if (b.paymentType === "full") paymentMethod = "Online (Paid in Full)";
    else if (b.paymentType === "advance") paymentMethod = "Online (Advance Paid)";

    doc.text(`Payment Method: ${paymentMethod}`, 14, yPos);
    doc.text(`Amount Paid: Rs. ${fmt(b.paid || 0)}`, 14, yPos + 6);
    const balance = Math.max((b.total || 0) - (b.paid || 0), 0);
    doc.setFont("helvetica", "bold");
    doc.text(`Balance Due: Rs. ${fmt(balance)}`, 14, yPos + 12);

    // Items / Furniture Summary (if any)
    yPos += 25;
    if (b.furniture || (b.selectedFurniture && Object.keys(b.selectedFurniture).length > 0)) {
        doc.setFont("helvetica", "bold");
        doc.setFontSize(11);
        doc.text("Items Summary", 14, yPos);
        doc.setFont("helvetica", "normal");
        doc.setFontSize(9);

        let furnText = b.furniture || "";
        if (!furnText && b.selectedFurniture) {
            furnText = Object.entries(b.selectedFurniture)
                .filter(([k,v]) => v > 0)
                .map(([k,v]) => `${k} x${v}`)
                .join(", ");
        }
        const furnLines = doc.splitTextToSize(furnText || "None specified", 180);
        doc.text(furnLines, 14, yPos + 5);
    }

    // --- Footer ---
    const pageHeight = doc.internal.pageSize.height;
    doc.setFillColor(245, 247, 250);
    doc.rect(0, pageHeight - 20, 210, 20, "F");

    doc.setTextColor(100, 100, 100);
    doc.setFontSize(9);
    doc.text("Thank you for choosing PackZen.", 14, pageHeight - 12);
    doc.text("Website: packzenblr.in", 14, pageHeight - 7);
    doc.text("Support: 9945095453", 150, pageHeight - 7);

    doc.save(`PackZen-Invoice-${b.bookingRef || targetId}.pdf`);
    toast("✅ Invoice downloaded successfully!");

  } catch (error) {
    console.error("Error generating invoice:", error);
    toast("❌ Error generating invoice.");
  }
}

async function emailInvoice(docId) {
  if (typeof emailjs === "undefined") { toast("⚠️ Email service not ready."); return; }
  if (!window._firebase) { toast("⚠️ Firebase not initialized."); return; }

  let targetId = docId;
  if (!targetId) { toast("⚠️ No booking found."); return; }

  toast("⏳ Sending Email...");

  try {
    const docSnap = await window._firebase.db.collection("bookings").doc(targetId).get();
    if (!docSnap.exists) { toast("⚠️ Booking not found."); return; }

    const b = docSnap.data();

    let recipientEmail = b.email;
    if (!recipientEmail) {
      // Fallback if no email on booking, try to fetch from user profile
      const userSnap = await window._firebase.db.collection("users").doc(b.customerUid).get();
      if(userSnap.exists && userSnap.data().email) {
        recipientEmail = userSnap.data().email;
      } else {
        toast("⚠️ No email address found for this customer.");
        return;
      }
    }

    emailjs.send("service_surriec", "template_hffggde", {
      booking_id: b.bookingRef || targetId,
      name: b.customerName || "Customer",
      email: recipientEmail,
      phone: b.phone || "—",
      pickup: (b.pickup || "").split(",")[0],
      drop: (b.drop || "").split(",")[0],
      date: b.date || "TBD",
      amount: b.total || 0,
      message: "Your invoice has been generated. You can download the PDF from your PackZen dashboard."
    }).then(() => {
      toast("✅ Invoice emailed successfully!");
    }).catch((err) => {
      console.error("Email failed:", err);
      toast("❌ Failed to send email.");
    });

  } catch (err) {
     console.error("Error fetching for email:", err);
     toast("❌ Error sending email.");
  }
}
</script>
