<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="robots" content="noindex, nofollow">
<title>Reset Password | PackZen Partner</title>
<link rel="apple-touch-icon" href="assets/logo/packzen-logo.png">
<link rel="icon" type="image/png" href="assets/logo/packzen-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile-fixes.css">
<link rel="stylesheet" href="desktop.css">
<link rel="stylesheet" href="partner.css">
<link rel="stylesheet" href="partner-portal.css">

  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body class="app-body partner-body" data-page="forgot-password">

<div class="auth-page-wrap">
  <div class="auth-page-card">
    <div class="auth-page-logo">
      <img src="assets/logo/packzen-logo.png" alt="PackZen">
      <span>PackZen Partner</span>
    </div>
    <h1 class="auth-page-title">Reset your password</h1>
    <p class="auth-page-sub">Enter your registered email and we'll send you a reset link</p>

    <div id="forgotError" class="auth-error-box"></div>
    <div id="forgotSuccess" class="auth-success-box"></div>

    <form id="forgotForm" novalidate>
      <div class="auth-field">
        <label for="forgotEmail">Email</label>
        <input type="email" id="forgotEmail" class="field-input" placeholder="you@business.com" autocomplete="email" required>
      </div>
      <button type="submit" class="pz-btn pz-btn-primary pz-btn-lg btn-block" id="forgotSubmitBtn">
        <span class="btn-label">Send Reset Link</span>
      </button>
    </form>

    <!-- NEW PASSWORD UI (Hidden by default, shown for mode=resetPassword) -->
    <div id="partnerNewPasswordUI" style="display:none; margin-top: 20px;">
      <h3 style="font-size:1.2rem; margin-bottom:0.5rem;">Create New Password</h3>
      <p style="font-size:0.9rem; color:var(--text-muted); margin-bottom:1rem;">For <strong id="newPasswordEmailDisplay"></strong></p>

      <div id="newPasswordError" class="auth-error-box"></div>
      <div id="newPasswordSuccess" class="auth-success-box"></div>

      <div class="auth-field">
        <label for="partnerNewPasswordInput">New Password</label>
        <div class="auth-pass-wrap">
          <input type="password" id="partnerNewPasswordInput" class="field-input" placeholder="Enter new password" required>
        </div>
      </div>
      <button type="button" class="pz-btn pz-btn-primary pz-btn-lg btn-block" id="btnSubmitPartnerNewPassword" onclick="submitPartnerNewPassword()">
        <span class="btn-label">Update Password</span>
      </button>
    </div>


    <div class="auth-page-foot">
      <a href="partner-login.html">← Back to Login</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="env-config.js"></script>
<script src="firebase-config.js"></script>
<script src="https://packzen-config.azharahmedm786.workers.dev"></script>
<script src="partner.js"></script>




<script>
  document.addEventListener('DOMContentLoaded', () => {
    if (typeof lucide !== 'undefined') {
        lucide.createIcons();

        // Debounced observer to prevent infinite loops and performance issues
        let timeout;
        const observer = new MutationObserver((mutations) => {
            let shouldUpdate = false;
            for (let m of mutations) {
                if (m.addedNodes.length > 0) {
                    shouldUpdate = true;
                    break;
                }
            }
            if (shouldUpdate) {
                clearTimeout(timeout);
                timeout = setTimeout(() => lucide.createIcons(), 50);
            }
        });
        observer.observe(document.body, { childList: true, subtree: true });
    }
  });
</script>

  <script src="icon-init.js"></script>
</body>
</html>
