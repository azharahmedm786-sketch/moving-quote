<title>Application Status | PackZen Partner</title>
<link rel="apple-touch-icon" href="assets/logo/packzen-logo.png">
<link rel="icon" type="image/png" href="assets/logo/packzen-logo.png">

<body class="app-body partner-body" data-page="registration-status">

<div class="auth-page-wrap">
  <div class="auth-page-card status-result-page">
    <div class="auth-page-logo">
      <img src="assets/logo/packzen-logo.png" alt="PackZen">
      <span>PackZen Partner</span>
    </div>
    <div class="status-result-icon" id="statusIcon">⏳</div>
    <h1 id="statusTitle">Application Under Review</h1>
    <p id="statusSub">Thanks for registering! Our team is verifying your documents.</p>
    <div id="statusReason" class="auth-error-box" style="display:none"></div>

    <a href="#" id="statusPrimaryBtn" class="pz-btn pz-btn-primary pz-btn-lg btn-block">Chat on WhatsApp</a>

    <div class="auth-page-foot">
      <a href="#" id="statusLogoutBtn">Log out</a>
    </div>
  </div>
</div>
