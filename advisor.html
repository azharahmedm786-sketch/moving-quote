<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>PackZen — Advisor Dashboard</title>
  <meta name="robots" content="noindex,nofollow,noarchive"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:       #0a0c0f;
      --surface:  #111418;
      --surface2: #181c22;
      --border:   #232830;
      --border2:  #2e3540;
      --gold:     #f5a623;
      --gold2:    #ffd166;
      --blue:     #3d9cf5;
      --green:    #00d17a;
      --red:      #ff4f5e;
      --purple:   #9b72f5;
      --text:     #e8ecf0;
      --muted:    #6b7686;
      --muted2:   #4a5260;
      --mono:     'Space Mono', monospace;
      --sans:     'Manrope', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── GRID NOISE TEXTURE ─── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle at 20% 30%, rgba(245,166,35,.04) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(61,156,245,.04) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── LOGIN ─── */
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }
    .login-card {
      width: 100%;
      max-width: 380px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px 36px;
      box-shadow: 0 40px 80px rgba(0,0,0,.6);
    }
    .login-logo {
      font-family: var(--mono);
      font-size: 1.1rem;
      color: var(--gold);
      letter-spacing: -.02em;
      margin-bottom: 4px;
    }
    .login-tagline {
      font-size: .78rem;
      color: var(--muted);
      font-weight: 500;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }
    .field-label {
      display: block;
      font-size: .75rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 7px;
      margin-top: 18px;
    }
    .field-input {
      width: 100%;
      background: var(--bg);
      border: 1.5px solid var(--border2);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--sans);
      font-size: .9rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color .2s;
    }
    .field-input:focus { border-color: var(--gold); }
    .btn-login {
      width: 100%;
      margin-top: 24px;
      padding: 13px;
      background: var(--gold);
      color: #000;
      border: none;
      border-radius: 10px;
      font-family: var(--sans);
      font-size: .9rem;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: .02em;
      transition: opacity .2s, transform .15s;
    }
    .btn-login:hover { opacity: .9; transform: translateY(-1px); }
    .btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }
    .login-err {
      font-size: .8rem;
      color: var(--red);
      min-height: 18px;
      margin-top: 10px;
      font-weight: 600;
    }
    .login-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(245,166,35,.08);
      border: 1px solid rgba(245,166,35,.2);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: .72rem;
      color: var(--gold);
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    /* ─── SHELL ─── */
    .shell {
      display: none;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }
    .shell.active { display: flex; }

    /* ─── SIDEBAR ─── */
    .sidebar {
      width: 220px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 100;
      overflow-y: auto;
    }
    .sb-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }
    .sb-logo-text {
      font-family: var(--mono);
      font-size: 1rem;
      color: var(--gold);
      font-weight: 700;
    }
    .sb-logo-sub {
      font-size: .68rem;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-top: 3px;
    }
    .sb-section {
      font-size: .66rem;
      font-weight: 800;
      color: var(--muted2);
      letter-spacing: .1em;
      text-transform: uppercase;
      padding: 18px 20px 7px;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 20px;
      font-size: .83rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all .15s;
      border-left: 3px solid transparent;
      user-select: none;
    }
    .nav-item:hover { color: var(--text); background: rgba(255,255,255,.03); }
    .nav-item.active { color: var(--gold); border-left-color: var(--gold); background: rgba(245,166,35,.06); }
    .nav-icon { font-size: 1rem; width: 18px; text-align: center; }
    .sb-bottom {
      margin-top: auto;
      padding: 16px 20px;
      border-top: 1px solid var(--border);
    }
    .advisor-chip {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .advisor-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), #e67e00);
      color: #000;
      font-weight: 800;
      font-size: .85rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .advisor-name {
      font-size: .8rem;
      font-weight: 700;
      color: var(--text);
    }
    .advisor-role {
      font-size: .68rem;
      color: var(--muted);
      margin-top: 1px;
    }
    .btn-signout {
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      background: rgba(255,79,94,.08);
      border: 1px solid rgba(255,79,94,.2);
      color: var(--red);
      border-radius: 8px;
      font-family: var(--sans);
      font-size: .78rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-signout:hover { background: rgba(255,79,94,.15); }

    /* ─── MAIN ─── */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 28px 28px 48px;
      min-height: 100vh;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .topbar-left h1 {
      font-family: var(--mono);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.03em;
    }
    .topbar-left p {
      font-size: .78rem;
      color: var(--muted);
      margin-top: 3px;
    }
    .live-dot {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(0,209,122,.08);
      border: 1px solid rgba(0,209,122,.2);
      border-radius: 20px;
      padding: 5px 12px;
      font-size: .72rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: .05em;
    }
    .live-dot::before {
      content: '';
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 1.8s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ─── SECTIONS ─── */
    .section { display: none; }
    .section.active { display: block; }

    /* ─── STATS GRID ─── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
      position: relative;
      overflow: hidden;
      transition: border-color .2s;
    }
    .stat-card:hover { border-color: var(--border2); }
    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0; right: 0;
      width: 80px; height: 80px;
      border-radius: 50%;
      opacity: .06;
      transform: translate(30%, 30%);
    }
    .stat-card.gold::after  { background: var(--gold); }
    .stat-card.blue::after  { background: var(--blue); }
    .stat-card.green::after { background: var(--green); }
    .stat-card.purple::after{ background: var(--purple); }
    .stat-card.red::after   { background: var(--red); }
    .stat-icon { font-size: 1.4rem; margin-bottom: 10px; }
    .stat-label {
      font-size: .7rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .stat-value {
      font-family: var(--mono);
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.03em;
      line-height: 1;
    }
    .stat-card.gold  .stat-value { color: var(--gold); }
    .stat-card.green .stat-value { color: var(--green); }
    .stat-sub {
      font-size: .72rem;
      color: var(--muted);
      margin-top: 5px;
    }

    /* ─── CHART ROW ─── */
    .chart-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 14px;
      margin-bottom: 22px;
    }
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px;
    }
    .chart-title {
      font-family: var(--mono);
      font-size: .82rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -.01em;
      margin-bottom: 4px;
    }
    .chart-sub {
      font-size: .72rem;
      color: var(--muted);
      margin-bottom: 16px;
    }
    .donut-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .donut-legend {
      width: 100%;
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: .78rem;
    }
    .legend-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .legend-left { display: flex; align-items: center; color: var(--muted); }
    .legend-val { font-weight: 700; color: var(--text); font-family: var(--mono); }

    /* ─── TABLE CARD ─── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 20px;
    }
    .table-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
      gap: 10px;
    }
    .table-title {
      font-family: var(--mono);
      font-size: .82rem;
      font-weight: 700;
      color: var(--text);
    }
    .table-actions { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .search-input {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: var(--sans);
      font-size: .78rem;
      color: var(--text);
      outline: none;
      width: 160px;
      transition: border-color .2s;
    }
    .search-input:focus { border-color: var(--gold); }
    .filter-sel {
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 6px 10px;
      font-family: var(--sans);
      font-size: .78rem;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      padding: 10px 16px;
      text-align: left;
      font-size: .68rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 12px 16px;
      font-size: .82rem;
      color: var(--text);
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,.015); }
    .empty-td { text-align: center; color: var(--muted); padding: 40px !important; font-size: .82rem; }

    /* ─── BADGES ─── */
    .badge {
      display: inline-block;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .03em;
    }
    .badge-pending   { background: rgba(245,166,35,.12); color: var(--gold); }
    .badge-confirmed { background: rgba(61,156,245,.12); color: var(--blue); }
    .badge-assigned  { background: rgba(155,114,245,.12); color: var(--purple); }
    .badge-packing   { background: rgba(61,156,245,.1); color: #7dd3fc; }
    .badge-transit   { background: rgba(245,166,35,.15); color: #fbbf24; }
    .badge-delivered { background: rgba(0,209,122,.12); color: var(--green); }
    .badge-cancelled { background: rgba(255,79,94,.1); color: var(--red); }

    /* ─── AMOUNT ─── */
    .amount { font-family: var(--mono); font-weight: 700; }

    /* ─── BOOKING REF ─── */
    .booking-ref {
      font-family: var(--mono);
      font-size: .75rem;
      color: var(--gold);
      background: rgba(245,166,35,.08);
      padding: 2px 7px;
      border-radius: 5px;
    }

    /* ─── CUSTOMER AVATAR ─── */
    .cust-avatar {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--blue), var(--purple));
      color: #fff;
      font-weight: 800;
      font-size: .78rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 8px;
      flex-shrink: 0;
    }
    .cust-cell { display: flex; align-items: center; }

    /* ─── ROUTE ─── */
    .route-cell { font-size: .78rem; color: var(--muted); max-width: 180px; }
    .route-from { color: var(--text); font-weight: 600; }

    /* ─── TOAST ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 50px;
      font-size: .82rem;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transition: opacity .25s, transform .25s;
      white-space: nowrap;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ─── KPI ROW ─── */
    .kpi-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .kpi-icon-wrap {
      width: 40px; height: 40px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .kpi-icon-wrap.gold   { background: rgba(245,166,35,.12); }
    .kpi-icon-wrap.green  { background: rgba(0,209,122,.10); }
    .kpi-icon-wrap.blue   { background: rgba(61,156,245,.10); }
    .kpi-label { font-size: .72rem; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
    .kpi-value { font-family: var(--mono); font-size: 1.2rem; font-weight: 700; color: var(--text); }

    /* ─── REVENUE TABLE ─── */
    .rev-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .rev-bar-track {
      flex: 1;
      height: 5px;
      background: var(--bg);
      border-radius: 3px;
      overflow: hidden;
    }
    .rev-bar-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      transition: width .6s ease;
    }

    /* ─── SCROLL TABLE ─── */
    .table-scroll { overflow-x: auto; }

    /* ─── PHONE LINK ─── */
    a.phone-link {
      color: var(--blue);
      text-decoration: none;
      font-family: var(--mono);
      font-size: .78rem;
    }
    a.phone-link:hover { text-decoration: underline; }

    /* ─── REFRESH BTN ─── */
    .btn-refresh {
      background: rgba(61,156,245,.08);
      border: 1px solid rgba(61,156,245,.2);
      color: var(--blue);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: var(--sans);
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-refresh:hover { background: rgba(61,156,245,.15); }

    /* ─── EXPORT BTN ─── */
    .btn-export {
      background: rgba(0,209,122,.08);
      border: 1px solid rgba(0,209,122,.2);
      color: var(--green);
      border-radius: 8px;
      padding: 6px 12px;
      font-family: var(--sans);
      font-size: .75rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-export:hover { background: rgba(0,209,122,.15); }

    /* ─── LOADING SPINNER ─── */
    .spinner {
      width: 20px; height: 20px;
      border: 2px solid var(--border2);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── SUMMARY STRIP ─── */
    .summary-strip {
      display: flex;
      align-items: center;
      gap: 24px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 18px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    .ss-item { display: flex; flex-direction: column; }
    .ss-label { font-size: .65rem; color: var(--muted); font-weight: 700; letter-spacing: .07em; text-transform: uppercase; }
    .ss-value { font-family: var(--mono); font-size: .95rem; font-weight: 700; color: var(--text); margin-top: 2px; }

    /* ─── RESPONSIVE ─── */
    @media (max-width: 900px) {
      .sidebar { width: 200px; }
      .main    { margin-left: 200px; }
      .chart-row { grid-template-columns: 1fr; }
      .kpi-row   { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 650px) {
      .sidebar { display: none; }
      .main    { margin-left: 0; padding: 16px; }
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .kpi-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <div class="login-badge">🔐 Restricted Access</div>
    <div class="login-logo">📦 PackZen</div>
    <div class="login-tagline">Advisor Dashboard</div>
    <label class="field-label">Email Address</label>
    <input id="adEmail" type="email" class="field-input" placeholder="your@packzenblr.in" autocomplete="off"
           onkeydown="if(event.key==='Enter')document.getElementById('adPass').focus()">
    <label class="field-label">Password</label>
    <input id="adPass" type="password" class="field-input" placeholder="••••••••"
           onkeydown="if(event.key==='Enter')doLogin()">
    <div id="loginErr" class="login-err"></div>
    <button class="btn-login" id="loginBtn" onclick="doLogin()">Access Dashboard →</button>
  </div>
</div>

<!-- SHELL -->
<div class="admin-shell" id="shell">
  <!-- SIDEBAR injected by JS after auth -->
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (same versions as your site) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Load your existing Firebase config — same file, same project -->
<script src="env-config.js"></script>
<script src="firebase-config.js"></script>

<script>
/* ════════════════════════════════════════════
   CONFIG — who can log into the Advisor panel
   ════════════════════════════════════════════ */
const ADVISOR_ROLES = ["admin", "advisor", "manager"];
const ADMIN_EMAILS  = [

/* ════════════════════════════════════════════
   FIREBASE INIT — wait for firebase-config.js
   ════════════════════════════════════════════ */
function waitFB(cb, n = 0) {
  if (window._firebase) { db = window._firebase.db; auth = window._firebase.auth; cb(); return; }
  if (n > 40) { document.getElementById("loginErr").textContent = "⚠️ Firebase config not loaded. Check firebase-config.js"; return; }
  setTimeout(() => waitFB(cb, n + 1), 200);
}

/* ════════════════════════════════════════════
   AUTO LOGIN CHECK
   ════════════════════════════════════════════ */
document.addEventListener("DOMContentLoaded", () => {
  waitFB(() => {
    auth.onAuthStateChanged(async user => {
      if (!user) return;
      const ok = await isAdvisor(user);
      if (ok) { advisorUser = user; buildShell(); }
    });
  });
});

/* ════════════════════════════════════════════
   LOGIN
   ════════════════════════════════════════════ */
async function doLogin() {
  const email = document.getElementById("adEmail").value.trim().toLowerCase();
  const pass  = document.getElementById("adPass").value;
  const err   = document.getElementById("loginErr");
  const btn   = document.getElementById("loginBtn");
  err.textContent = "";
  if (!email || !pass) { err.textContent = "⚠️ Please enter email and password."; return; }
  btn.disabled = true; btn.textContent = "Signing in...";
  waitFB(async () => {
    try {
      const cred = await auth.signInWithEmailAndPassword(email, pass);
      const ok   = await isAdvisor(cred.user);
      if (!ok) {
        await auth.signOut();
        err.textContent = "⚠️ Access denied. Your account does not have advisor permissions.";
        btn.disabled = false; btn.textContent = "Access Dashboard →";
        return;
      }
      advisorUser = cred.user;
      buildShell();
    } catch (e) {
      const msgs = {
        "auth/wrong-password":            "⚠️ Incorrect password.",
        "auth/invalid-credential":        "⚠️ Incorrect email or password.",
        "auth/user-not-found":            "⚠️ No account found for this email.",
        "auth/invalid-email":             "⚠️ Invalid email address.",
        "auth/too-many-requests":         "⚠️ Too many attempts. Please wait.",
      };
      err.textContent = msgs[e.code] || ("⚠️ " + e.message);
      btn.disabled = false; btn.textContent = "Access Dashboard →";
    }
  });
}

async function isAdvisor(user) {
  if (ADMIN_EMAILS.includes((user.email || "").toLowerCase())) return true;
  try {
    const doc = await db.collection("users").doc(user.uid).get();
    const role = doc.exists ? (doc.data() || {}).role : null;
    return ADVISOR_ROLES.includes(role);
  } catch (e) { return false; }
}

/* ════════════════════════════════════════════
   LOAD ALL DATA (real-time Firestore listeners)
   ════════════════════════════════════════════ */
function loadAll() {
  // Clean up existing listeners
  if (unsubBookings)  unsubBookings();
  if (unsubCustomers) unsubCustomers();
  if (unsubDrivers)   unsubDrivers();

  // Live bookings
  unsubBookings = db.collection("bookings").orderBy("createdAt","desc")
    .onSnapshot(snap => {
      allBookings = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      updateStats();
      renderRecentTable();
      renderBookingsTable(allBookings);
      renderCharts();
      renderRevenue();
    }, err => toast("⚠️ Bookings: " + err.message));

  // Customers
  unsubCustomers = db.collection("users").where("role","==","customer")
    .onSnapshot(snap => {
      allCustomers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      document.getElementById("stCustomers").textContent = allCustomers.length;
      renderCustomers(allCustomers);
    }, () => {});

  // Drivers
  unsubDrivers = db.collection("users").where("role","==","driver")
    .onSnapshot(snap => {
      allDrivers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      document.getElementById("stDrivers").textContent = allDrivers.length;
      renderDrivers();
    }, () => {});
}

  const total     = allBookings.length;
  const delivered = allBookings.filter(b => b.status === "delivered").length;
  const active    = allBookings.filter(b => ["assigned","packing","transit"].includes(b.status)).length;
  const revenue   = allBookings.reduce((s, b) => s + (b.total || 0), 0);

  setText("stTotal",     total);
  setText("stDelivered", delivered);
  setText("stActive",    active);
  setText("stRevenue",   fmt(revenue));
}

function filterBookings(q) {
  const stat = document.getElementById("statusFilter")?.value || "";
  let list = allBookings.filter(b =>
    (b.customerName||"").toLowerCase().includes(q.toLowerCase()) ||
    (b.id||"").toLowerCase().includes(q.toLowerCase()) ||
    (b.bookingRef||"").toLowerCase().includes(q.toLowerCase()) ||
    (b.phone||"").includes(q)
  );
  if (stat) list = list.filter(b => b.status === stat);
  filteredBookings = list;
  renderBookingsTable(list);
}

function filterBookingsByStatus(stat) {
  const q = document.getElementById("bookingSearch")?.value || "";
  let list = q ? allBookings.filter(b =>
    (b.customerName||"").toLowerCase().includes(q.toLowerCase()) ||
    (b.id||"").toLowerCase().includes(q.toLowerCase()) ||
    (b.bookingRef||"").toLowerCase().includes(q.toLowerCase())
  ) : [...allBookings];
  if (stat) list = list.filter(b => b.status === stat);
  filteredBookings = list;
  renderBookingsTable(list);
}

  const revPerMo    = new Array(12).fill(0);
  allBookings.forEach(b => {
    const d = b.createdAt?.toDate?.();
    if (!d) return;
    booksPerMo[d.getMonth()]++;
    revPerMo[d.getMonth()] += b.total || 0;
  });

  const gColor = alpha => `rgba(245,166,35,${alpha})`;
  const bColor = alpha => `rgba(61,156,245,${alpha})`;

  const ctx1 = document.getElementById("overviewChart");
  if (ctx1) {
    if (bookingsChart) bookingsChart.destroy();
    bookingsChart = new Chart(ctx1, {
      type: "bar",
      data: {
        labels: months,
        datasets: [
          { label: "Bookings", data: booksPerMo, backgroundColor: bColor(.4), borderColor: bColor(1), borderWidth: 2, borderRadius: 5, yAxisID: "y" },
          { label: "Revenue (₹)", data: revPerMo, type: "line", borderColor: gColor(1), backgroundColor: gColor(.1), borderWidth: 2, tension: .4, pointBackgroundColor: gColor(1), pointRadius: 3, yAxisID: "y1" }
        ]
      },
      options: {
        responsive: true,
        interaction: { mode: "index", intersect: false },
        plugins: { legend: { labels: { color: "#6b7686", font: { family: "'Manrope',sans-serif", size: 11 } } } },
        scales: {
          x:  { grid: { color: "rgba(255,255,255,.04)" }, ticks: { color: "#6b7686", font: { size: 10 } } },
          y:  { grid: { color: "rgba(255,255,255,.04)" }, ticks: { color: "#6b7686", font: { size: 10 } }, position: "left" },
          y1: { grid: { display: false }, ticks: { color: "#f5a623", font: { size: 10 }, callback: v => "₹" + (v >= 1000 ? (v/1000).toFixed(1)+"k" : v) }, position: "right" }
        }
      }
    });
  }

  // Status donut
  const statusMap = {};
  allBookings.forEach(b => { statusMap[b.status||"pending"] = (statusMap[b.status||"pending"]||0) + 1; });
  const statusColors = {
    confirmed: "#3d9cf5", assigned: "#9b72f5", packing: "#7dd3fc",
    transit: "#fbbf24", delivered: "#00d17a", cancelled: "#ff4f5e", pending: "#f5a623"
  };
  const labels = Object.keys(statusMap), values = Object.values(statusMap);
  const ctx2 = document.getElementById("statusChart");
  if (ctx2) {
    if (statusChart) statusChart.destroy();
    statusChart = new Chart(ctx2, {
      type: "doughnut",
      data: { labels, datasets: [{ data: values, backgroundColor: labels.map(l => statusColors[l]||"#555"), borderColor: "var(--surface)", borderWidth: 3, hoverOffset: 6 }] },
      options: { responsive: false, cutout: "68%", plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw}` } } } }
    });
    const legend = document.getElementById("statusLegend");
    if (legend) {
      legend.innerHTML = labels.map((l, i) => `
        <div class="legend-item">
          <div class="legend-left"><div class="legend-dot" style="background:${statusColors[l]||"#555"}"></div>${cap(l)}</div>
          <div class="legend-val">${values[i]}</div>
        </div>`).join("");
    }
  }
}

/* ════════════════════════════════════════════
   REVENUE SECTION
   ════════════════════════════════════════════ */
let revenueTypeChart = null;

function renderRevenue() {
  const total    = allBookings.reduce((s,b)=>s+(b.total||0),0);
  const avg      = allBookings.length ? Math.round(total/allBookings.length) : 0;
  const thisM    = allBookings.filter(b => {
    const d = b.createdAt?.toDate?.();
    return d && d.getMonth() === new Date().getMonth() && d.getFullYear() === new Date().getFullYear();
  }).reduce((s,b)=>s+(b.total||0),0);

  setText("kpiRevTotal",   fmt(total));
  setText("kpiAvg",        "₹"+avg.toLocaleString("en-IN"));
  setText("kpiThisMonth",  fmt(thisM));

  // Monthly breakdown table
  const months      = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const booksPerMo  = new Array(12).fill(0);
  const revPerMo    = new Array(12).fill(0);
  allBookings.forEach(b => {
    const d = b.createdAt?.toDate?.();
    if (!d) return;
    booksPerMo[d.getMonth()]++;
    revPerMo[d.getMonth()] += b.total || 0;
  });
  const maxRev = Math.max(...revPerMo, 1);
  const tbody  = document.getElementById("revTable");
  if (tbody) {
    tbody.innerHTML = months.map((m, i) => {
      if (!booksPerMo[i] && !revPerMo[i]) return "";
      const pct = ((revPerMo[i] / total) * 100).toFixed(1);
      return `<tr>
        <td style="font-weight:600">${m} 2026</td>
        <td class="amount">${booksPerMo[i]}</td>
        <td>
          <div class="rev-bar">
            <div class="rev-bar-track"><div class="rev-bar-fill" style="width:${(revPerMo[i]/maxRev)*100}%"></div></div>
            <span class="amount" style="min-width:80px">₹${revPerMo[i].toLocaleString("en-IN")}</span>
          </div>
        </td>
        <td class="amount">₹${booksPerMo[i] ? Math.round(revPerMo[i]/booksPerMo[i]).toLocaleString("en-IN") : 0}</td>
        <td style="color:var(--gold)">${pct}%</td>
      </tr>`;
    }).filter(Boolean).join("") || '<tr><td class="empty-td" colspan="5">No revenue data yet</td></tr>';
  }

  // Revenue by move type chart
  const typeRev = { home: 0, office: 0, single: 0, other: 0 };
  allBookings.forEach(b => {
    const t = b.moveType || "other";
    if (typeRev[t] !== undefined) typeRev[t] += b.total || 0;
    else typeRev.other += b.total || 0;
  });
  const ctx3 = document.getElementById("revenueTypeChart");
  if (ctx3) {
    if (revenueTypeChart) revenueTypeChart.destroy();
    revenueTypeChart = new Chart(ctx3, {
      type: "bar",
      data: {
        labels: ["🏠 Home Move", "🏢 Office Shift", "📦 Single Item", "Other"],
        datasets: [{
          data: [typeRev.home, typeRev.office, typeRev.single, typeRev.other],
          backgroundColor: ["rgba(245,166,35,.5)","rgba(61,156,245,.5)","rgba(0,209,122,.5)","rgba(155,114,245,.5)"],
          borderColor:     ["#f5a623","#3d9cf5","#00d17a","#9b72f5"],
          borderWidth: 2, borderRadius: 6
        }]
      },
      options: {
        responsive: true,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { color: "rgba(255,255,255,.04)" }, ticks: { color: "#6b7686" } },
          y: { grid: { color: "rgba(255,255,255,.04)" }, ticks: { color: "#6b7686", callback: v => "₹" + (v>=1000?(v/1000).toFixed(1)+"k":v) } }
        }
      }
    });
  }
}

/* ════════════════════════════════════════════
   SECTION NAV
   ════════════════════════════════════════════ */
const sectionMeta = {
  overview:  { title: "Overview",   sub: "Live snapshot of your business" },
  revenue:   { title: "Revenue",    sub: "Sales analytics & breakdown" },
  bookings:  { title: "Bookings",   sub: "All move orders from packzenblr.in" },
  customers: { title: "Customers",  sub: "Registered users & spending" },
  drivers:   { title: "Drivers",    sub: "Fleet status & performance" }
};

function showSection(name, navEl) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
  const sec = document.getElementById("sec" + cap(name));
  if (sec) sec.classList.add("active");
  if (navEl) navEl.classList.add("active");
  const meta = sectionMeta[name] || {};
  setText("sectionTitle", meta.title || cap(name));
  setText("sectionSub",   meta.sub   || "Real-time data");
  activeSection = name;
  if (name === "overview") renderCharts();
  if (name === "revenue")  renderRevenue();
  if (name === "drivers")  renderDrivers();
}

/* ════════════════════════════════════════════
   EXPORT CSV
   ════════════════════════════════════════════ */
function exportBookingsCSV() {
  const list = filteredBookings || allBookings;
  const rows = [["Ref","Customer","Phone","Pickup","Drop","Date","Amount","Payment","Status","Driver"]];
  list.forEach(b => rows.push([
    b.bookingRef||b.id.slice(-6), b.customerName||"", b.phone||"",
    (b.pickup||"").replace(/,/g," "), (b.drop||"").replace(/,/g," "),
    b.date||"", b.total||0, payLabel(b), b.status||"", b.driverName||""
  ]));
  downloadCSV(rows, "PackZen-Bookings");
}

function exportCustomersCSV() {
  const rows = [["Name","Email","Phone","Bookings","Total Spent","Joined"]];
  allCustomers.forEach(c => {
    const bookings = allBookings.filter(b=>b.customerUid===c.id);
    const spent    = bookings.reduce((s,b)=>s+(b.total||0),0);
    rows.push([c.name||"", c.email||"", c.phone||"", bookings.length, spent,
               c.createdAt?.toDate?c.createdAt.toDate().toLocaleDateString("en-IN"):"—"]);
  });
  downloadCSV(rows, "PackZen-Customers");
}

function exportRevenueCSV() {
  const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  const booksM = new Array(12).fill(0), revM = new Array(12).fill(0);
  allBookings.forEach(b => { const d=b.createdAt?.toDate?.(); if(!d) return; booksM[d.getMonth()]++; revM[d.getMonth()]+=b.total||0; });
  const total = revM.reduce((a,b)=>a+b,0);
  const rows  = [["Month","Bookings","Revenue","Avg Value","% of Total"]];
  months.forEach((m,i) => { if(!booksM[i]) return; rows.push([`${m} 2026`, booksM[i], revM[i], booksM[i]?Math.round(revM[i]/booksM[i]):0, total?((revM[i]/total)*100).toFixed(1)+"%":"0%"]); });
  downloadCSV(rows, "PackZen-Revenue");
}

function downloadCSV(rows, name) {
  const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a   = document.createElement("a");
  a.href    = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  a.download = `${name}-${new Date().toLocaleDateString("en-IN").replace(/\//g,"-")}.csv`;
  a.click();
  toast("📥 CSV downloaded");
}

/* ════════════════════════════════════════════
   SIGN OUT
   ════════════════════════════════════════════ */
function doSignOut() {
  if (unsubBookings)  unsubBookings();
  if (unsubCustomers) unsubCustomers();
  if (unsubDrivers)   unsubDrivers();
  auth.signOut().then(() => {
    const shell = document.getElementById("shell");
    shell.innerHTML = ""; shell.classList.remove("active");
    shell.style.display = "none";
    document.getElementById("loginWrap").style.display = "flex";
    advisorUser = null; allBookings=[]; allCustomers=[]; allDrivers=[];
  });
}

/* ════════════════════════════════════════════
   UTILS
   ════════════════════════════════════════════ */
function cap(s)        { return s ? s.charAt(0).toUpperCase()+s.slice(1) : ""; }
function setText(id,v) { const el=document.getElementById(id); if(el) el.textContent=v; }
function shortAddr(a)  { return a ? a.split(",")[0].trim() : "—"; }
function fmt(n)        { return n >= 100000 ? "₹"+(n/100000).toFixed(1)+"L" : "₹"+n.toLocaleString("en-IN"); }
function payLabel(b)   {
  if (b.paymentType==="full")     return "Full Paid";
  if (b.paymentType==="advance")  return "Advance";
  if (b.source==="whatsapp")      return "WhatsApp";
  return "Pay on Day";
}

/* ─── TOAST ─── */
function toast(msg, dur=3000) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove("show"), dur);
}
