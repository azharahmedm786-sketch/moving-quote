<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Offline - PackZen</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,Helvetica,sans-serif;
background:#050d1a;
color:#fff;
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

.card{
max-width:420px;
width:100%;
background:#0b1527;
padding:35px;
border-radius:18px;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.logo{
width:90px;
margin-bottom:20px;
}

h1{
font-size:28px;
margin-bottom:12px;
}

p{
color:#c7d2e3;
line-height:1.6;
margin-bottom:15px;
}

.buttons{
display:flex;
flex-direction:column;
gap:12px;
margin-top:25px;
}

button,
a{
display:block;
padding:14px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
font-size:16px;
cursor:pointer;
}

.retry{
background:#22c55e;
color:white;
border:none;
}

.retry:hover{
background:#16a34a;
}

.home{
background:#2563eb;
color:white;
}

.call{
background:#f59e0b;
color:white;
}
</style>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

<div class="card">

<img src="/assets/logo/newllogo1.png" class="logo" alt="PackZen Logo">

<h1><i data-lucide="circle"></i> You're Offline</h1>

<p>
It looks like your internet connection has been lost.
</p>

<p>
Reconnect to continue booking with PackZen Packers & Movers.
</p>

<div class="buttons">

<button class="retry" onclick="location.reload();">
Retry Connection
</button>

<a class="home" href="/">
Go to Home
</a>

<a class="call" href="tel:9945095453">
Call Support
</a>

</div>

</div>

</body>
</html>
