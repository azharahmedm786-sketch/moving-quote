<!DOCTYPE html>
<html lang="en-IN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta name="robots" content="noindex, nofollow">
<title>Partner Login | PackZen</title>
<link rel="apple-touch-icon" href="assets/logo/packzen-logo.png">
<link rel="icon" type="image/png" href="assets/logo/packzen-logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="mobile-fixes.css">
<link rel="stylesheet" href="desktop.css">
<link rel="stylesheet" href="partner.css">
<link rel="stylesheet" href="partner-portal.css">
</head>
<body class="app-body partner-body" data-page="login">

<div class="auth-page-wrap">
  <div class="auth-page-card">
    <div class="auth-page-logo">
      <img src="assets/logo/packzen-logo.png" alt="PackZen">
      <span>PackZen Partner</span>
    </div>
    <h1 class="auth-page-title">Welcome back</h1>
    <p class="auth-page-sub">Log in to manage your bookings and earnings</p>

    <div id="loginError" class="auth-error-box"></div>

    <form id="loginForm" novalidate>
      <div class="auth-field">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" class="field-input" placeholder="you@business.com" autocomplete="email" required>
      </div>
      <div class="auth-field">
        <label for="loginPassword">Password</label>
        <div class="auth-pass-wrap">
          <input type="password" id="loginPassword" class="field-input" placeholder="Enter your password" autocomplete="current-password" required>
          <button type="button" class="auth-eye-btn" id="togglePassBtn" aria-label="Show password">👁</button>
        </div>
      </div>
      <div class="auth-row-between">
        <label class="auth-remember">
          <input type="checkbox" id="rememberMe">
          Remember me
        </label>
        <a href="partner-forgot-password.html" class="auth-link">Forgot password?</a>
      </div>
      <button type="submit" class="pz-btn pz-btn-primary pz-btn-lg btn-block" id="loginSubmitBtn">
        <span class="btn-label">Log In</span>
      </button>
    </form>

    <div class="auth-page-foot">
      New partner? <a href="partner-register.html">Register here</a><br>
      <a href="partner.html">← Back to Partner Home</a>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="env-config.js"></script>
<script src="firebase-config.js"></script>
<script src="https://packzen-config.azharahmedm786.workers.dev"></script>
<script src="partner.js"></script>
</body>
</html>
